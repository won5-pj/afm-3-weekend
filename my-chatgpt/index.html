<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌙 잠 못 드는 밤, 상담실</title>

  <!-- ⚠️ 모든 CDN은 버전을 명시적으로 고정한다. 미고정 시 @babel/standalone 이
       최신(8.x)으로 올라가 type="text/babel" 인라인 변환이 통째로 깨진다.
       Babel 은 반드시 7.x 로 고정. React/ReactDOM 도 정확히 핀. -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <style>
    /* Tailwind 로 표현하기 어려운 것들만 커스텀 */

    /* 별이 빛나는 밤하늘 배경 */
    body {
      margin: 0;
      background: radial-gradient(ellipse at top, #1e1b4b 0%, #0f172a 45%, #020617 100%);
      background-attachment: fixed;
    }

    /* 은은하게 반짝이는 별들 (배경 레이어) */
    .night-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 40% 70%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 60% 85%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 30% 15%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.7), transparent);
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: 0.45; }
      100% { opacity: 0.95; }
    }

    /* 메시지 등장 애니메이션 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-enter { animation: fadeInUp 0.35s ease-out both; }

    /* 타이핑 점 애니메이션 */
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%           { transform: translateY(-5px); opacity: 1; }
    }
    .typing-dot { animation: typingBounce 1.2s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }

    /* 스크롤바 (어두운 톤) */
    .chat-scroll::-webkit-scrollbar { width: 8px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.35);
      border-radius: 9999px;
    }
    .chat-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.55);
    }

    /* textarea 리사이즈 제거 */
    textarea { resize: none; }
  </style>
</head>
<body>
  <div class="night-stars"></div>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useRef, useEffect, useCallback } = React;

    // 같은 출처(same-origin) API. localhost 하드코딩 금지.
    const API_BASE_URL = '/api';

    // 첫 진입 환영 인사 (프론트 표시 전용 — 서버로는 보내지 않음)
    const WELCOME_MESSAGE =
      '안녕하세요. 요즘 잠은 어떠세요? 편하게 이야기해 주세요. 🌙';

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // 달 + 별 헤더 아이콘
    function MoonIcon({ className = '' }) {
      return (
        <svg viewBox="0 0 24 24" fill="none" className={className} aria-hidden="true">
          <path
            d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
            fill="currentColor"
          />
        </svg>
      );
    }

    // 채팅 말풍선
    function ChatBubble({ role, content }) {
      const isUser = role === 'user';
      return (
        <div
          className={`msg-enter flex w-full ${isUser ? 'justify-end' : 'justify-start'}`}
        >
          <div className={`flex max-w-[82%] sm:max-w-[70%] items-end gap-2 ${isUser ? 'flex-row-reverse' : 'flex-row'}`}>
            {/* 아바타 (상담사만) */}
            {!isUser && (
              <div className="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full bg-indigo-500/30 text-lg shadow-inner">
                🌙
              </div>
            )}
            <div
              className={[
                'whitespace-pre-wrap break-words rounded-2xl px-4 py-3 text-[15px] leading-relaxed shadow-lg',
                isUser
                  ? 'rounded-br-md bg-gradient-to-br from-indigo-500 to-purple-600 text-white'
                  : 'rounded-bl-md bg-slate-800/80 text-slate-100 ring-1 ring-white/10 backdrop-blur',
              ].join(' ')}
            >
              {content}
            </div>
          </div>
        </div>
      );
    }

    // 타이핑 인디케이터 (로딩)
    function TypingIndicator() {
      return (
        <div className="msg-enter flex justify-start">
          <div className="flex items-end gap-2">
            <div className="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full bg-indigo-500/30 text-lg shadow-inner">
              🌙
            </div>
            <div className="flex items-center gap-1.5 rounded-2xl rounded-bl-md bg-slate-800/80 px-5 py-4 ring-1 ring-white/10 backdrop-blur">
              <span className="typing-dot h-2 w-2 rounded-full bg-slate-300"></span>
              <span className="typing-dot h-2 w-2 rounded-full bg-slate-300"></span>
              <span className="typing-dot h-2 w-2 rounded-full bg-slate-300"></span>
            </div>
          </div>
        </div>
      );
    }

    // 에러 토스트/배너
    function ErrorBanner({ message, onClose }) {
      if (!message) return null;
      return (
        <div className="msg-enter mx-auto flex w-full max-w-3xl items-start gap-3 rounded-xl border border-rose-400/30 bg-rose-500/15 px-4 py-3 text-sm text-rose-100 backdrop-blur">
          <span className="text-lg leading-none">⚠️</span>
          <p className="flex-1">{message}</p>
          <button
            type="button"
            onClick={onClose}
            aria-label="에러 닫기"
            className="rounded-md px-2 text-rose-200 transition hover:bg-rose-500/20"
          >
            ✕
          </button>
        </div>
      );
    }

    // ========================================
    // 🧩 Layout Components
    // ========================================

    function Header() {
      return (
        <header className="flex flex-shrink-0 items-center gap-3 border-b border-white/10 px-5 py-4 sm:px-7">
          <div className="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-400/40 to-purple-500/40 ring-1 ring-white/15">
            <MoonIcon className="h-6 w-6 text-amber-200" />
          </div>
          <div className="min-w-0">
            <h1 className="truncate text-lg font-semibold text-white sm:text-xl">
              잠 못 드는 밤, 상담실
            </h1>
            <p className="truncate text-xs text-slate-400 sm:text-sm">
              편안한 마음으로, 오늘 밤의 잠 이야기를 나눠요
            </p>
          </div>
        </header>
      );
    }

    // ========================================
    // 📄 Page Component — 채팅 화면
    // ========================================

    function ChatPage() {
      // messages: [{ role: 'user' | 'assistant', content }] — /api/chat 으로 보낼 기록.
      // 환영 인사는 화면 표시용으로만 포함하되, 서버 전송 시 제외하지 않아도 무방하나
      // 요구사항대로 "서버로는 안 보내도 됨" → 별도 welcome 플래그로 분리 관리.
      const [messages, setMessages] = useState([
        { role: 'assistant', content: WELCOME_MESSAGE, _welcome: true },
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const scrollRef = useRef(null);
      const textareaRef = useRef(null);

      // 새 메시지/로딩 변화 시 맨 아래로 자동 스크롤
      useEffect(() => {
        const el = scrollRef.current;
        if (el) el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
      }, [messages, loading]);

      const sendMessage = useCallback(async () => {
        const text = input.trim();
        if (!text || loading) return;

        setError('');
        const userMsg = { role: 'user', content: text };

        // 화면 업데이트 (환영 인사 포함된 전체 목록)
        const nextMessages = [...messages, userMsg];
        setMessages(nextMessages);
        setInput('');

        // 서버로 보낼 기록: 환영 인사(_welcome) 제외 + user/assistant 의 role/content 만
        const payloadMessages = nextMessages
          .filter((m) => !m._welcome)
          .map(({ role, content }) => ({ role, content }));

        setLoading(true);
        try {
          const res = await fetch(`${API_BASE_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: payloadMessages }),
          });

          let data = null;
          try {
            data = await res.json();
          } catch (_) {
            // JSON 파싱 실패
          }

          if (!res.ok || !data || typeof data.reply !== 'string') {
            const serverMsg = data && data.error ? data.error : null;
            throw new Error(
              serverMsg ||
                '상담사와 연결이 잠시 끊겼어요. 잠시 후 다시 시도해 주세요.'
            );
          }

          setMessages((prev) => [
            ...prev,
            { role: 'assistant', content: data.reply },
          ]);
        } catch (err) {
          setError(
            err.message ||
              '문제가 발생했어요. 잠시 후 다시 이야기해 주세요.'
          );
        } finally {
          setLoading(false);
          // 전송 후 입력창으로 포커스 복귀
          requestAnimationFrame(() => {
            if (textareaRef.current) textareaRef.current.focus();
          });
        }
      }, [input, loading, messages]);

      // Enter 전송 / Shift+Enter 줄바꿈
      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      return (
        <div className="mx-auto flex h-[100dvh] w-full max-w-3xl flex-col">
          <Header />

          {/* 채팅 영역 */}
          <main
            ref={scrollRef}
            className="chat-scroll flex-1 space-y-4 overflow-y-auto px-4 py-6 sm:px-6"
          >
            {messages.map((m, i) => (
              <ChatBubble key={i} role={m.role} content={m.content} />
            ))}

            {loading && <TypingIndicator />}

            <ErrorBanner message={error} onClose={() => setError('')} />
          </main>

          {/* 입력 영역 */}
          <footer className="flex-shrink-0 border-t border-white/10 bg-slate-950/40 px-3 py-3 backdrop-blur sm:px-5 sm:py-4">
            <div className="flex items-end gap-2 rounded-2xl bg-slate-800/70 p-2 ring-1 ring-white/10 focus-within:ring-indigo-400/50">
              <textarea
                ref={textareaRef}
                rows={1}
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                disabled={loading}
                placeholder="오늘 밤, 어떤 점이 잠을 방해하나요?"
                aria-label="메시지 입력"
                className="max-h-40 flex-1 resize-none bg-transparent px-3 py-2 text-[15px] text-slate-100 placeholder-slate-500 outline-none disabled:opacity-50"
                style={{ minHeight: '44px' }}
              />
              <button
                type="button"
                onClick={sendMessage}
                disabled={loading || !input.trim()}
                aria-label="전송"
                className="flex h-11 w-11 flex-shrink-0 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 text-white shadow-lg transition hover:from-indigo-400 hover:to-purple-500 disabled:cursor-not-allowed disabled:opacity-40"
              >
                {loading ? (
                  <svg className="h-5 w-5 animate-spin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
                  </svg>
                ) : (
                  <svg className="h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"
                      fill="currentColor" />
                  </svg>
                )}
              </button>
            </div>
            <p className="mt-2 px-2 text-center text-[11px] text-slate-500">
              Enter 전송 · Shift+Enter 줄바꿈 · 본 상담은 의료 진단을 대체하지 않아요
            </p>
          </footer>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return <ChatPage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
