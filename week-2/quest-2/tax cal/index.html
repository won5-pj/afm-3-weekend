<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부가가치세 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.25s ease-out; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo } = React;

    // ========================================
    // 유틸리티 함수
    // ========================================
    // 천 단위 구분 기호로 통화 포맷팅 (원 단위로 반올림)
    const formatKRW = (n) => {
      const num = Math.round(Number(n) || 0);
      return num.toLocaleString('ko-KR') + '원';
    };

    // 빠른 선택용 부가세율 목록 (배열) — 일반 10%, 영세율 0%, 사용자 정의를 위한 후보
    const QUICK_RATES = [0, 10];

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ variant = 'primary', size = 'md', className = '', children, ...props }) {
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white',
        secondary: 'bg-slate-200 hover:bg-slate-300 text-slate-800',
        danger: 'bg-rose-500 hover:bg-rose-600 text-white',
        ghost: 'bg-transparent hover:bg-slate-100 text-slate-600',
      };
      const sizes = { sm: 'px-2.5 py-1 text-sm', md: 'px-4 py-2', lg: 'px-5 py-2.5 text-lg' };
      return (
        <button
          className={`rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', ...props }) {
      return (
        <label className="block">
          {label && <span className="block text-sm font-medium text-slate-600 mb-1">{label}</span>}
          <input
            className={`w-full px-3 py-2 rounded-lg border ${error ? 'border-rose-400' : 'border-slate-300'} focus:outline-none focus:ring-2 focus:ring-indigo-400 ${className}`}
            {...props}
          />
          {error && <span className="block text-xs text-rose-500 mt-1">{error}</span>}
        </label>
      );
    }

    function Card({ className = '', children }) {
      return <div className={`bg-white rounded-2xl shadow-sm p-5 ${className}`}>{children}</div>;
    }

    function Badge({ color = 'indigo', children }) {
      const colors = {
        indigo: 'bg-indigo-100 text-indigo-700',
        green: 'bg-emerald-100 text-emerald-700',
        rose: 'bg-rose-100 text-rose-700',
        slate: 'bg-slate-100 text-slate-600',
      };
      return <span className={`inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold ${colors[color]}`}>{children}</span>;
    }

    // ========================================
    // 🧮 계산 핵심 함수 (조건 분기 central)
    // ========================================
    // 한 품목의 입력 금액과 모드/세율에 따라 공급가액·세액·합계를 계산
    //  - mode 'add'    : 입력 금액 = 공급가액  → 세액 = 공급가액 × 세율, 합계 = 공급가액 + 세액
    //  - mode 'extract': 입력 금액 = 합계금액 → 공급가액 = 합계 ÷ (1+세율), 세액 = 합계 - 공급가액
    // 세액은 원 단위로 반올림(Math.round)하여 한국 부가세 관행을 따름
    function computeLine(amount, mode, ratePercent) {
      const amt = Number(amount) || 0;
      const rate = (Number(ratePercent) || 0) / 100;

      let supply = 0;   // 공급가액
      let tax = 0;      // 세액(부가세)
      let total = 0;    // 합계금액

      // 조건 분기: 계산 모드에 따라 식이 달라짐
      if (mode === 'add') {
        // 공급가액 → 합계
        supply = amt;
        tax = Math.round(supply * rate);          // 원 단위 반올림
        total = supply + tax;
      } else {
        // 합계 → 공급가액 (세액을 역산)
        // 조건 분기: 세율이 0이면 0으로 나누는 상황 방지 (영세율 처리)
        if (rate === 0) {
          supply = amt;
          tax = 0;
        } else {
          supply = Math.round(amt / (1 + rate)); // 원 단위 반올림
          tax = amt - supply;                    // 합계에서 공급가액을 빼서 세액 도출
        }
        total = amt;
      }

      return { supply, tax, total };
    }

    // ========================================
    // 🧩 품목 입력 행 컴포넌트
    // ========================================
    function ItemRow({ item, index, mode, ratePercent, onChange, onRemove, removable }) {
      // 행별 즉시 계산 결과 (미리보기)
      const calc = computeLine(item.amount, mode, ratePercent);
      const amountLabel = mode === 'add' ? '공급가액' : '합계금액';

      return (
        <div className="flex gap-2 items-start animate-fadeIn">
          <div className="flex-1">
            <Input
              placeholder="품목 이름 (예: 노트북)"
              value={item.name}
              onChange={(e) => onChange({ ...item, name: e.target.value })}
              aria-label="품목 이름"
            />
          </div>
          <div className="w-40">
            <Input
              type="number"
              min="0"
              placeholder={amountLabel}
              value={item.amount}
              onChange={(e) => onChange({ ...item, amount: e.target.value })}
              aria-label={amountLabel}
            />
            <span className="block text-[11px] text-slate-400 mt-1 text-right">
              {mode === 'add' ? `합계 ${formatKRW(calc.total)}` : `공급가액 ${formatKRW(calc.supply)}`}
            </span>
          </div>
          <Button
            variant="ghost"
            size="sm"
            className="mt-0.5 text-rose-500"
            onClick={onRemove}
            disabled={!removable}
            aria-label="품목 삭제"
          >
            ✕
          </Button>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      // 계산 모드: 'add' (공급가액→합계) | 'extract' (합계→공급가액)
      const [mode, setMode] = useState('add');

      // 부가세율 (기본 10%)
      const [ratePercent, setRatePercent] = useState('10');

      // 여러 품목 배열 — 배열 + 반복문의 핵심
      const [items, setItems] = useState([
        { id: 1, name: '품목 1', amount: '' },
      ]);

      // 품목 추가
      const addItem = () =>
        setItems((prev) => [...prev, { id: Date.now(), name: `품목 ${prev.length + 1}`, amount: '' }]);

      // 품목 변경
      const changeItem = (id, updated) =>
        setItems((prev) => prev.map((it) => (it.id === id ? updated : it)));

      // 품목 삭제 (최소 1개는 유지)
      const removeItem = (id) =>
        setItems((prev) => (prev.length <= 1 ? prev : prev.filter((it) => it.id !== id)));

      // 빠른 세율 버튼 클릭
      const applyQuickRate = (r) => setRatePercent(String(r));

      // ========================================
      // 계산 로직 (배열 + 반복문 + 조건 분기)
      // ========================================
      const result = useMemo(() => {
        // 반복문(map): 각 품목별 계산 결과 배열 생성
        const lines = items.map((it) => {
          const c = computeLine(it.amount, mode, ratePercent);
          return { id: it.id, name: it.name, ...c };
        });

        // 반복문(for): 합계 누적 — for 루프로 배열을 순회하며 합산
        let sumSupply = 0;
        let sumTax = 0;
        let sumTotal = 0;
        for (let i = 0; i < lines.length; i++) {
          sumSupply += lines[i].supply;
          sumTax += lines[i].tax;
          sumTotal += lines[i].total;
        }

        return { lines, sumSupply, sumTax, sumTotal };
      }, [items, mode, ratePercent]);

      // 유효성: 세율 범위 안내 (조건 분기)
      const rateNum = Number(ratePercent);
      const rateError =
        ratePercent === '' ? null
        : isNaN(rateNum) || rateNum < 0 || rateNum > 100
        ? '0 ~ 100 사이의 값을 입력하세요.'
        : null;

      return (
        <div className="min-h-screen py-8 px-4">
          <div className="max-w-3xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="text-center">
              <h1 className="text-3xl font-bold text-slate-800">🧾 부가가치세 계산기</h1>
              <p className="text-slate-500 mt-1">공급가액 · 세액(부가세) · 합계금액을 한 번에 계산해드려요.</p>
            </header>

            {/* 1. 계산 모드 */}
            <Card>
              <h2 className="font-bold text-slate-700 mb-3">1️⃣ 계산 방향</h2>
              <div className="flex flex-col sm:flex-row gap-2">
                {/* 조건 분기: 선택된 모드에 따라 스타일 변경 */}
                <button
                  onClick={() => setMode('add')}
                  className={`flex-1 rounded-xl border px-4 py-3 text-left transition-colors ${mode === 'add' ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200 bg-white hover:bg-slate-50'}`}
                >
                  <span className="block font-semibold text-slate-800">공급가액 → 합계</span>
                  <span className="block text-xs text-slate-500 mt-0.5">공급가액에 부가세를 더해요</span>
                </button>
                <button
                  onClick={() => setMode('extract')}
                  className={`flex-1 rounded-xl border px-4 py-3 text-left transition-colors ${mode === 'extract' ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200 bg-white hover:bg-slate-50'}`}
                >
                  <span className="block font-semibold text-slate-800">합계 → 공급가액</span>
                  <span className="block text-xs text-slate-500 mt-0.5">합계에서 부가세를 빼요</span>
                </button>
              </div>
            </Card>

            {/* 2. 부가세율 */}
            <Card>
              <h2 className="font-bold text-slate-700 mb-3">2️⃣ 부가세율</h2>
              <div className="flex flex-wrap items-end gap-3">
                <div className="w-32">
                  <Input
                    type="number"
                    min="0"
                    max="100"
                    value={ratePercent}
                    onChange={(e) => setRatePercent(e.target.value)}
                    label="세율 (%)"
                    error={rateError}
                    className="font-bold"
                  />
                </div>
                <div className="flex gap-2 pb-0.5">
                  {/* 반복문(map): 배열에 담긴 빠른 세율 버튼 렌더링 */}
                  {QUICK_RATES.map((r) => (
                    <Button
                      key={r}
                      variant={String(r) === ratePercent ? 'primary' : 'secondary'}
                      size="sm"
                      onClick={() => applyQuickRate(r)}
                    >
                      {r}%
                    </Button>
                  ))}
                </div>
              </div>
              <p className="text-xs text-slate-400 mt-2">대한민국 일반과세 표준 부가가치세율은 10%입니다. (영세율 적용 시 0%)</p>
            </Card>

            {/* 3. 품목 입력 */}
            <Card>
              <div className="flex items-center justify-between mb-3">
                <h2 className="font-bold text-slate-700">3️⃣ 품목 입력 (여러 개 가능)</h2>
                <Badge color="slate">{items.length}개</Badge>
              </div>
              <div className="space-y-2">
                {/* 반복문(map): 품목 배열 렌더링 */}
                {items.map((it, i) => (
                  <ItemRow
                    key={it.id}
                    item={it}
                    index={i}
                    mode={mode}
                    ratePercent={ratePercent}
                    onChange={(updated) => changeItem(it.id, updated)}
                    onRemove={() => removeItem(it.id)}
                    removable={items.length > 1}
                  />
                ))}
              </div>
              <Button variant="secondary" size="sm" className="mt-3" onClick={addItem}>
                + 품목 추가
              </Button>
            </Card>

            {/* 4. 결과 출력 */}
            <Card className="bg-gradient-to-br from-indigo-600 to-violet-600 text-white">
              <h2 className="font-bold text-lg mb-4">4️⃣ 계산 결과</h2>

              {/* 품목별 상세 (반복문) */}
              <div className="bg-white/10 rounded-xl p-4 mb-4">
                <h3 className="font-semibold mb-3 flex items-center gap-2">
                  품목별 내역 <Badge color="indigo">세율 {Number(ratePercent) || 0}%</Badge>
                </h3>
                <div className="space-y-2">
                  {result.lines.map((ln) => (
                    <div key={ln.id} className="bg-white/10 rounded-lg px-3 py-2 text-sm">
                      <div className="flex justify-between font-semibold">
                        <span>{ln.name || '(이름 없음)'}</span>
                        <span>{formatKRW(ln.total)}</span>
                      </div>
                      <div className="flex justify-between text-xs text-indigo-100 mt-1">
                        <span>공급가액 {formatKRW(ln.supply)}</span>
                        <span>부가세 {formatKRW(ln.tax)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* 총합 (배열을 for 루프로 합산한 결과) */}
              <div className="space-y-2 text-sm">
                <div className="flex justify-between">
                  <span className="text-indigo-100">공급가액 합계</span>
                  <span className="font-semibold">{formatKRW(result.sumSupply)}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-indigo-100">세액(부가세) 합계</span>
                  <span className="font-semibold">{formatKRW(result.sumTax)}</span>
                </div>
                <div className="flex justify-between text-base border-t border-white/20 pt-2 mt-2">
                  <span className="font-bold">합계금액</span>
                  <span className="font-bold">{formatKRW(result.sumTotal)}</span>
                </div>
              </div>

              {/* 조건 분기: 입력이 모두 비어있을 때 안내 */}
              {result.sumTotal === 0 && (
                <p className="mt-4 text-center text-indigo-100 text-sm">
                  금액을 입력하면 부가세가 계산돼요 😊
                </p>
              )}

              <p className="mt-4 text-[11px] text-indigo-200 text-center">
                ※ 세액은 원 단위로 반올림하여 계산됩니다.
              </p>
            </Card>

            <footer className="text-center text-slate-400 text-xs pb-6">
              배열 · 반복문 · 조건 분기로 계산하는 부가가치세 계산기
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
