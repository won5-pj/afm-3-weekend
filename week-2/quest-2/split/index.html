<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.25s ease-out; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo } = React;

    // ========================================
    // 유틸리티 함수
    // ========================================
    // 천 단위 구분 기호로 통화 포맷팅
    const formatKRW = (n) => {
      const num = Math.round(Number(n) || 0);
      return num.toLocaleString('ko-KR') + '원';
    };

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ variant = 'primary', size = 'md', className = '', children, ...props }) {
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white',
        secondary: 'bg-slate-200 hover:bg-slate-300 text-slate-800',
        danger: 'bg-rose-500 hover:bg-rose-600 text-white',
        ghost: 'bg-transparent hover:bg-slate-100 text-slate-600',
      };
      const sizes = { sm: 'px-2.5 py-1 text-sm', md: 'px-4 py-2', lg: 'px-5 py-2.5 text-lg' };
      return (
        <button
          className={`rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', ...props }) {
      return (
        <label className="block">
          {label && <span className="block text-sm font-medium text-slate-600 mb-1">{label}</span>}
          <input
            className={`w-full px-3 py-2 rounded-lg border ${error ? 'border-rose-400' : 'border-slate-300'} focus:outline-none focus:ring-2 focus:ring-indigo-400 ${className}`}
            {...props}
          />
          {error && <span className="block text-xs text-rose-500 mt-1">{error}</span>}
        </label>
      );
    }

    function Card({ className = '', children }) {
      return <div className={`bg-white rounded-2xl shadow-sm p-5 ${className}`}>{children}</div>;
    }

    function Badge({ color = 'indigo', children }) {
      const colors = {
        indigo: 'bg-indigo-100 text-indigo-700',
        green: 'bg-emerald-100 text-emerald-700',
        rose: 'bg-rose-100 text-rose-700',
        slate: 'bg-slate-100 text-slate-600',
      };
      return <span className={`inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold ${colors[color]}`}>{children}</span>;
    }

    // ========================================
    // 🧩 메뉴 입력 행 컴포넌트
    // ========================================
    function MenuRow({ item, onChange, onRemove }) {
      return (
        <div className="flex gap-2 items-start animate-fadeIn">
          <div className="flex-1">
            <Input
              placeholder="메뉴 이름 (예: 김치찌개)"
              value={item.name}
              onChange={(e) => onChange({ ...item, name: e.target.value })}
            />
          </div>
          <div className="w-32">
            <Input
              type="number"
              min="0"
              placeholder="가격"
              value={item.price}
              onChange={(e) => onChange({ ...item, price: e.target.value })}
            />
          </div>
          <Button variant="ghost" size="sm" className="mt-0.5 text-rose-500" onClick={onRemove} aria-label="메뉴 삭제">✕</Button>
        </div>
      );
    }

    // ========================================
    // 🧩 1인 카드 컴포넌트
    // ========================================
    function PersonCard({ person, index, onChangePerson }) {
      // 배열(arrays) + 반복문(loops): 이 사람의 메뉴 가격을 reduce로 합산
      const personTotal = person.menus.reduce((sum, m) => sum + (Number(m.price) || 0), 0);

      const updateMenus = (menus) => onChangePerson({ ...person, menus });

      const addMenu = () => updateMenus([...person.menus, { id: Date.now(), name: '', price: '' }]);

      const changeMenu = (menuId, newItem) =>
        updateMenus(person.menus.map((m) => (m.id === menuId ? newItem : m)));

      const removeMenu = (menuId) =>
        updateMenus(person.menus.filter((m) => m.id !== menuId));

      return (
        <Card className="border border-slate-100">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <span className="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold">
                {index + 1}
              </span>
              <input
                className="font-semibold text-slate-800 bg-transparent border-b border-transparent hover:border-slate-300 focus:border-indigo-400 focus:outline-none"
                value={person.name}
                onChange={(e) => onChangePerson({ ...person, name: e.target.value })}
                aria-label="이름"
              />
            </div>
            <Badge color="slate">합계 {formatKRW(personTotal)}</Badge>
          </div>

          <div className="space-y-2">
            {/* 반복문(loops): map으로 메뉴 배열 렌더링 */}
            {person.menus.length === 0 ? (
              <p className="text-sm text-slate-400 py-2">아직 추가한 메뉴가 없어요. 아래 버튼으로 추가하세요.</p>
            ) : (
              person.menus.map((m) => (
                <MenuRow
                  key={m.id}
                  item={m}
                  onChange={(newItem) => changeMenu(m.id, newItem)}
                  onRemove={() => removeMenu(m.id)}
                />
              ))
            )}
          </div>

          <Button variant="secondary" size="sm" className="mt-3" onClick={addMenu}>
            + 메뉴 추가
          </Button>
        </Card>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [people, setPeople] = useState([
        { id: 1, name: '사람 1', menus: [] },
        { id: 2, name: '사람 2', menus: [] },
      ]);

      // 할인 관련 상태
      const [discountEnabled, setDiscountEnabled] = useState(false);
      const [discountType, setDiscountType] = useState('percent'); // 'percent' | 'amount'
      const [discountValue, setDiscountValue] = useState('');

      // 인원수 변경 처리
      const setPeopleCount = (count) => {
        const n = Math.max(1, Math.min(20, Number(count) || 1));
        setPeople((prev) => {
          const next = [...prev];
          // 반복문 + 조건 분기: 인원이 늘면 추가, 줄면 잘라냄
          if (n > prev.length) {
            for (let i = prev.length; i < n; i++) {
              next.push({ id: Date.now() + i, name: `사람 ${i + 1}`, menus: [] });
            }
          } else if (n < prev.length) {
            return prev.slice(0, n);
          }
          return next;
        });
      };

      const changePerson = (id, updated) =>
        setPeople((prev) => prev.map((p) => (p.id === id ? updated : p)));

      // ========================================
      // 계산 로직 (배열 + 반복문 + 조건 분기)
      // ========================================
      const result = useMemo(() => {
        // 반복문(reduce): 각자 합계 배열 만들기
        const personSubtotals = people.map((p) =>
          p.menus.reduce((sum, m) => sum + (Number(m.price) || 0), 0)
        );

        // 전체 합계
        const grandTotal = personSubtotals.reduce((sum, v) => sum + v, 0);

        // 조건 분기: 할인 적용 여부 및 종류 판단
        let discountAmount = 0;
        const dv = Number(discountValue) || 0;
        if (discountEnabled && dv > 0 && grandTotal > 0) {
          if (discountType === 'percent') {
            // 퍼센트 할인 (0~100 사이로 제한)
            const pct = Math.min(100, Math.max(0, dv));
            discountAmount = Math.round((grandTotal * pct) / 100);
          } else {
            // 정액 할인 (전체 합계를 넘지 않도록 제한)
            discountAmount = Math.min(dv, grandTotal);
          }
        }

        const totalAfterDiscount = grandTotal - discountAmount;

        // 반복문 + 조건 분기: 각자 부담액 계산
        // 할인은 각자 먹은 금액 비율(또는 균등)에 따라 배분
        const perPerson = people.map((p, i) => {
          const subtotal = personSubtotals[i];
          let share;
          if (grandTotal > 0) {
            // 먹은 비율에 따라 할인 배분
            share = subtotal - (discountAmount * subtotal) / grandTotal;
          } else {
            share = 0;
          }
          return {
            id: p.id,
            name: p.name,
            subtotal,
            pay: Math.round(share),
          };
        });

        // 균등 분배(N분의 1) 금액도 함께 제공
        const evenSplit = people.length > 0 ? Math.round(totalAfterDiscount / people.length) : 0;

        return { personSubtotals, grandTotal, discountAmount, totalAfterDiscount, perPerson, evenSplit };
      }, [people, discountEnabled, discountType, discountValue]);

      return (
        <div className="min-h-screen py-8 px-4">
          <div className="max-w-3xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="text-center">
              <h1 className="text-3xl font-bold text-slate-800">🧮 더치페이 계산기</h1>
              <p className="text-slate-500 mt-1">각자 먹은 메뉴와 할인을 입력하면 1인당 낼 금액을 알려드려요.</p>
            </header>

            {/* 1. 인원수 */}
            <Card>
              <h2 className="font-bold text-slate-700 mb-3">1️⃣ 인원수</h2>
              <div className="flex items-center gap-3">
                <Button variant="secondary" size="sm" onClick={() => setPeopleCount(people.length - 1)} aria-label="인원 감소">－</Button>
                <div className="w-20">
                  <Input
                    type="number"
                    min="1"
                    max="20"
                    value={people.length}
                    onChange={(e) => setPeopleCount(e.target.value)}
                    className="text-center font-bold"
                  />
                </div>
                <Button variant="secondary" size="sm" onClick={() => setPeopleCount(people.length + 1)} aria-label="인원 증가">＋</Button>
                <span className="text-slate-500 text-sm">명</span>
              </div>
            </Card>

            {/* 2. 각자 먹은 메뉴 */}
            <section>
              <h2 className="font-bold text-slate-700 mb-3 px-1">2️⃣ 각자 먹은 메뉴</h2>
              <div className="space-y-4">
                {/* 반복문: 사람 배열 렌더링 */}
                {people.map((p, i) => (
                  <PersonCard
                    key={p.id}
                    person={p}
                    index={i}
                    onChangePerson={(updated) => changePerson(p.id, updated)}
                  />
                ))}
              </div>
            </section>

            {/* 3. 할인 적용 */}
            <Card>
              <h2 className="font-bold text-slate-700 mb-3">3️⃣ 할인 적용</h2>
              <label className="flex items-center gap-2 mb-3 cursor-pointer">
                <input
                  type="checkbox"
                  checked={discountEnabled}
                  onChange={(e) => setDiscountEnabled(e.target.checked)}
                  className="w-4 h-4 accent-indigo-600"
                />
                <span className="text-slate-700">할인을 적용할게요</span>
              </label>

              {/* 조건 분기: 할인 활성화 시에만 입력란 표시 */}
              {discountEnabled && (
                <div className="flex flex-wrap items-end gap-3 animate-fadeIn">
                  <div className="flex rounded-lg overflow-hidden border border-slate-300">
                    <button
                      onClick={() => setDiscountType('percent')}
                      className={`px-4 py-2 text-sm font-medium ${discountType === 'percent' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600'}`}
                    >
                      퍼센트 (%)
                    </button>
                    <button
                      onClick={() => setDiscountType('amount')}
                      className={`px-4 py-2 text-sm font-medium ${discountType === 'amount' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600'}`}
                    >
                      정액 (원)
                    </button>
                  </div>
                  <div className="w-40">
                    <Input
                      type="number"
                      min="0"
                      placeholder={discountType === 'percent' ? '예: 10' : '예: 5000'}
                      value={discountValue}
                      onChange={(e) => setDiscountValue(e.target.value)}
                      label={discountType === 'percent' ? '할인율 (%)' : '할인 금액 (원)'}
                    />
                  </div>
                </div>
              )}
            </Card>

            {/* 4. 결과 출력 */}
            <Card className="bg-gradient-to-br from-indigo-600 to-violet-600 text-white">
              <h2 className="font-bold text-lg mb-4">4️⃣ 결과</h2>

              <div className="space-y-2 text-sm">
                <div className="flex justify-between">
                  <span className="text-indigo-100">총 주문 금액</span>
                  <span className="font-semibold">{formatKRW(result.grandTotal)}</span>
                </div>
                {/* 조건 분기: 할인 금액이 있을 때만 표시 */}
                {result.discountAmount > 0 && (
                  <div className="flex justify-between text-emerald-200">
                    <span>할인 금액</span>
                    <span className="font-semibold">- {formatKRW(result.discountAmount)}</span>
                  </div>
                )}
                <div className="flex justify-between text-base border-t border-white/20 pt-2 mt-2">
                  <span className="font-bold">최종 결제 금액</span>
                  <span className="font-bold">{formatKRW(result.totalAfterDiscount)}</span>
                </div>
              </div>

              {/* 1인당 부담액 (먹은 만큼) */}
              <div className="mt-5 bg-white/10 rounded-xl p-4">
                <h3 className="font-semibold mb-3 flex items-center gap-2">
                  먹은 만큼 내기 <Badge color="green">메뉴 기준</Badge>
                </h3>
                <div className="space-y-2">
                  {/* 반복문: 결과 배열 렌더링 */}
                  {result.perPerson.map((p) => (
                    <div key={p.id} className="flex justify-between items-center bg-white/10 rounded-lg px-3 py-2">
                      <span>{p.name}</span>
                      <div className="text-right">
                        <span className="font-bold">{formatKRW(p.pay)}</span>
                        {result.discountAmount > 0 && (
                          <span className="block text-xs text-indigo-200">원래 {formatKRW(p.subtotal)}</span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* N분의 1 */}
              <div className="mt-4 bg-white/10 rounded-xl p-4 flex items-center justify-between">
                <h3 className="font-semibold flex items-center gap-2">
                  똑같이 나누기 <Badge color="indigo">N분의 1</Badge>
                </h3>
                <div className="text-right">
                  <span className="font-bold text-lg">{formatKRW(result.evenSplit)}</span>
                  <span className="block text-xs text-indigo-200">1인당 ({people.length}명 기준)</span>
                </div>
              </div>

              {/* 조건 분기: 금액이 0일 때 안내 */}
              {result.grandTotal === 0 && (
                <p className="mt-4 text-center text-indigo-100 text-sm">
                  메뉴와 가격을 입력하면 결과가 계산돼요 😊
                </p>
              )}
            </Card>

            <footer className="text-center text-slate-400 text-xs pb-6">
              배열 · 반복문 · 조건 분기로 계산하는 더치페이 계산기
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
