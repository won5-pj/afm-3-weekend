<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛍️ MEN'S SHOP · 남성의류 쇼핑몰</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- Supabase JS (UMD) → window.supabase.createClient -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- React 18 + Babel (인라인 JSX) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .animate-fadeIn { animation: fadeIn 0.25s ease-out; }
    .animate-slideUp { animation: slideUp 0.22s cubic-bezier(.2,.8,.2,1); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ============================================================
    // ⚙️ Supabase 설정
    // ============================================================
    const SUPABASE_URL = 'https://ifrydgoofjalfufcpxka.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_lpU174Ykn1vPFv9fmUJfxQ_tviU0Xa4';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 장바구니 조회 시 상품 정보를 함께 임베드 (products FK)
    const CART_SELECT = 'id, quantity, product_id, products ( id, name, price, image_url, description )';

    // ============================================================
    // 🛠️ 헬퍼
    // ============================================================
    const won = (n) => `${Number(n || 0).toLocaleString('ko-KR')}원`;

    function friendly(err) {
      const m = (err && err.message) || String(err || '알 수 없는 오류');
      const map = {
        'Invalid login credentials': '이메일 또는 비밀번호가 올바르지 않습니다.',
        'Email not confirmed': '이메일 인증이 필요합니다. 메일함을 확인하거나 관리자에게 문의하세요.',
        'User already registered': '이미 가입된 이메일입니다. 로그인해 주세요.',
        'Password should be at least 6 characters': '비밀번호는 최소 6자 이상이어야 합니다.',
        'duplicate key value': '이미 장바구니에 있는 상품입니다.',
      };
      for (const k in map) if (m.includes(k)) return map[k];
      return m;
    }

    // ============================================================
    // 🎨 공용 UI
    // ============================================================
    function Button({ variant = 'primary', size = 'md', type = 'button', disabled, onClick, className = '', children }) {
      const base = 'inline-flex items-center justify-center gap-1.5 font-semibold rounded-xl transition-all focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-slate-900 hover:bg-slate-800 text-white focus:ring-slate-300 shadow-sm',
        accent: 'bg-indigo-600 hover:bg-indigo-700 text-white focus:ring-indigo-300 shadow-sm',
        secondary: 'bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 focus:ring-slate-200',
        danger: 'bg-white hover:bg-red-50 text-red-600 border border-red-200 focus:ring-red-200',
        ghost: 'bg-transparent hover:bg-slate-100 text-slate-500 focus:ring-slate-200',
      };
      const sizes = { sm: 'px-3 py-1.5 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-5 py-2.5 text-base' };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>{children}</button>
      );
    }
    function Input({ label, type = 'text', value, onChange, placeholder, disabled, autoFocus }) {
      return (
        <label className="block">
          {label && <span className="block mb-1 text-sm font-medium text-slate-600">{label}</span>}
          <input type={type} value={value} onChange={onChange} placeholder={placeholder} disabled={disabled} autoFocus={autoFocus}
            className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-300 transition disabled:bg-slate-100" />
        </label>
      );
    }
    function Banner({ tone = 'error', message, onClose }) {
      if (!message) return null;
      const tones = {
        error: 'bg-red-50 border-red-100 text-red-600',
        info: 'bg-indigo-50 border-indigo-100 text-indigo-700',
        success: 'bg-emerald-50 border-emerald-100 text-emerald-700',
      };
      return (
        <div className={`flex items-start justify-between gap-3 p-3 rounded-xl border text-sm ${tones[tone]}`}>
          <span className="whitespace-pre-wrap">{tone === 'error' ? '⚠️ ' : tone === 'success' ? '✅ ' : 'ℹ️ '}{message}</span>
          {onClose && <button onClick={onClose} className="opacity-60 hover:opacity-100 flex-none">✕</button>}
        </div>
      );
    }
    function Spinner({ label }) {
      return (
        <div className="flex flex-col items-center justify-center py-16 text-slate-400">
          <div className="w-8 h-8 border-4 border-indigo-200 border-t-indigo-500 rounded-full animate-spin mb-3"></div>
          {label && <p className="text-sm">{label}</p>}
        </div>
      );
    }
    // 토스트 (하단 중앙, 자동 소멸)
    function Toast({ toast }) {
      if (!toast) return null;
      const tones = { success: 'bg-emerald-600', info: 'bg-slate-800', error: 'bg-red-600' };
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 animate-fadeIn">
          <div className={`${tones[toast.tone] || tones.info} text-white text-sm font-medium px-5 py-3 rounded-full shadow-lg`}>
            {toast.msg}
          </div>
        </div>
      );
    }
    // 모달
    function Modal({ open, onClose, children }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 animate-slideUp" onClick={(e) => e.stopPropagation()}>
            {children}
          </div>
        </div>
      );
    }

    // ============================================================
    // 🔐 회원가입 / 로그인 화면
    // ============================================================
    function AuthScreen({ reason, onBack }) {
      const [mode, setMode] = useState('login'); // 'login' | 'signup'
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState('');
      const [info, setInfo] = useState('');

      const reset = (m) => { setMode(m); setError(''); setInfo(''); };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError(''); setInfo('');
        if (!email.trim() || !password) { setError('이메일과 비밀번호를 입력해 주세요.'); return; }
        setBusy(true);
        try {
          if (mode === 'signup') {
            const { data, error } = await db.auth.signUp({ email: email.trim(), password });
            if (error) throw error;
            if (data.session) return; // 이메일 인증 OFF → 즉시 로그인 (onAuthStateChange 처리)
            setInfo('회원가입이 완료되었습니다. 로그인해 주세요.');
            setMode('login'); setPassword('');
          } else {
            const { error } = await db.auth.signInWithPassword({ email: email.trim(), password });
            if (error) throw error; // 성공 시 onAuthStateChange 가 화면 전환
          }
        } catch (err) {
          setError(friendly(err));
        } finally {
          setBusy(false);
        }
      };

      return (
        <div className="min-h-[80vh] flex items-center justify-center px-4 py-10">
          <div className="w-full max-w-md animate-fadeIn">
            <div className="text-center mb-6">
              <div className="text-5xl mb-2">🛍️</div>
              <h1 className="text-2xl font-extrabold text-slate-800">MEN'S SHOP</h1>
              <p className="text-slate-500 text-sm mt-1">장바구니를 쓰려면 로그인이 필요해요.</p>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
              {reason && <div className="mb-4"><Banner tone="info" message={reason} /></div>}
              {/* 탭 */}
              <div className="grid grid-cols-2 gap-1 p-1 mb-5 bg-slate-100 rounded-xl">
                {[['login', '로그인'], ['signup', '회원가입']].map(([m, label]) => (
                  <button key={m} onClick={() => reset(m)}
                    className={`py-2 rounded-lg text-sm font-semibold transition ${
                      mode === m ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                    }`}>{label}</button>
                ))}
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                <Input label="이메일" type="email" value={email} onChange={(e) => setEmail(e.target.value)}
                  placeholder="you@example.com" disabled={busy} autoFocus />
                <Input label="비밀번호" type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                  placeholder="6자 이상" disabled={busy} />

                <Banner tone="error" message={error} onClose={() => setError('')} />
                <Banner tone="info" message={info} onClose={() => setInfo('')} />

                <Button type="submit" variant="accent" size="lg" disabled={busy} className="w-full">
                  {busy ? '처리 중...' : mode === 'login' ? '로그인' : '회원가입'}
                </Button>
              </form>

              <p className="text-center text-xs text-slate-400 mt-4">
                {mode === 'login'
                  ? <>계정이 없으신가요? <button onClick={() => reset('signup')} className="text-indigo-600 font-semibold hover:underline">회원가입</button></>
                  : <>이미 계정이 있으신가요? <button onClick={() => reset('login')} className="text-indigo-600 font-semibold hover:underline">로그인</button></>}
              </p>
            </div>
            <div className="text-center mt-5">
              <button onClick={onBack} className="text-sm text-slate-500 hover:text-slate-700">← 상품 구경만 하기</button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // 🧺 상품 카드 + 목록 (로그인 없이 공개)
    // ============================================================
    // ⭐ 별점: 평균 표시 + (로그인 시) 1~5점 클릭으로 내 별점 등록/수정
    function StarRating({ avg, count, mine, onRate, busy }) {
      const [hover, setHover] = useState(0);
      const shown = hover || mine; // 호버 미리보기 > 내 별점
      return (
        <div className="mt-2">
          <div className="flex items-center gap-1 text-xs">
            <span className="text-amber-400">★</span>
            {count > 0
              ? <><span className="font-semibold text-slate-700">{avg.toFixed(1)}</span><span className="text-slate-400">({count})</span></>
              : <span className="text-slate-400">평가 없음</span>}
          </div>
          <div className="flex items-center gap-0.5 mt-1" onMouseLeave={() => setHover(0)}>
            {[1, 2, 3, 4, 5].map((n) => (
              <button key={n} type="button" disabled={busy}
                onMouseEnter={() => setHover(n)} onClick={() => onRate(n)}
                aria-label={`${n}점 주기`}
                className="leading-none text-base disabled:opacity-50 transition-transform hover:scale-110">
                <span className={n <= shown ? 'text-amber-400' : 'text-slate-300'}>★</span>
              </button>
            ))}
            <span className="ml-1 text-[11px] text-slate-400">{mine ? `내 별점 ${mine}점` : '평가하기'}</span>
          </div>
        </div>
      );
    }

    function ProductCard({ p, onAdd, adding, stat, onRate, ratingBusy }) {
      const count = stat ? stat.count : 0;
      const avg = count ? stat.sum / count : 0;
      const mine = stat ? stat.mine : 0;
      return (
        <div className="group bg-white rounded-2xl border border-slate-100 overflow-hidden hover:shadow-lg hover:-translate-y-0.5 transition-all flex flex-col">
          <div className="aspect-square overflow-hidden bg-slate-100">
            <img src={p.image_url} alt={p.name} loading="lazy"
              className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
          </div>
          <div className="p-4 flex flex-col flex-1">
            <h3 className="font-bold text-slate-800 leading-tight">{p.name}</h3>
            <p className="text-sm text-slate-400 mt-1 line-clamp-2 flex-1">{p.description}</p>
            <StarRating avg={avg} count={count} mine={mine} onRate={(n) => onRate(p, n)} busy={ratingBusy} />
            <div className="mt-3 flex items-center justify-between gap-2">
              <span className="text-lg font-extrabold text-slate-900">{won(p.price)}</span>
              <Button variant="primary" size="sm" onClick={() => onAdd(p)} disabled={adding}>
                🛒 담기
              </Button>
            </div>
          </div>
        </div>
      );
    }

    function ProductGrid({ onAdd, addingId, session, onNeedLogin, onToast }) {
      const [products, setProducts] = useState([]);
      const [ratings, setRatings] = useState([]);   // {product_id, rating, user_id}
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [query, setQuery] = useState('');
      const [ratingBusy, setRatingBusy] = useState(null);

      const load = useCallback(async () => {
        setLoading(true); setError('');
        const [pRes, rRes] = await Promise.all([
          db.from('products').select('*').order('id'),
          db.from('ratings').select('product_id, rating, user_id'),  // 공개 조회 (평균 계산용)
        ]);
        if (pRes.error) setError(friendly(pRes.error));
        else setProducts(pRes.data || []);
        if (!rRes.error) setRatings(rRes.data || []);
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      // 상품별 별점 집계: {product_id: {sum, count, mine}}
      const stats = React.useMemo(() => {
        const m = {};
        const uid = session ? session.user.id : null;
        for (const r of ratings) {
          const s = m[r.product_id] || (m[r.product_id] = { sum: 0, count: 0, mine: 0 });
          s.sum += r.rating; s.count += 1;
          if (uid && r.user_id === uid) s.mine = r.rating;
        }
        return m;
      }, [ratings, session]);

      // 별점 등록/수정 (로그인 필수 · 사용자당 상품별 1개 · 낙관적 업데이트)
      const rate = async (product, value) => {
        if (!session) { onNeedLogin('별점을 남기려면 로그인해 주세요.'); return; }
        const uid = session.user.id;
        setRatingBusy(product.id);
        try {
          const mine = ratings.find((r) => r.product_id === product.id && r.user_id === uid);
          if (mine) {
            const { error } = await db.from('ratings').update({ rating: value })
              .eq('product_id', product.id).eq('user_id', uid);
            if (error) throw error;
            setRatings((prev) => prev.map((r) =>
              (r.product_id === product.id && r.user_id === uid) ? { ...r, rating: value } : r));
          } else {
            // user_id 는 DB 기본값 auth.uid() 로 채워짐 (RLS: 본인만 등록 가능)
            const { error } = await db.from('ratings').insert({ product_id: product.id, rating: value });
            if (error) throw error;
            setRatings((prev) => [...prev, { product_id: product.id, rating: value, user_id: uid }]);
          }
          onToast({ tone: 'success', msg: `⭐ '${product.name}' ${value}점 평가 완료!` });
        } catch (err) {
          onToast({ tone: 'error', msg: friendly(err) });
          load();
        } finally {
          setRatingBusy(null);
        }
      };

      // 검색: 상품명·설명에서 실시간 필터 (대소문자 무시)
      const q = query.trim().toLowerCase();
      const filtered = q
        ? products.filter((p) =>
            (p.name || '').toLowerCase().includes(q) ||
            (p.description || '').toLowerCase().includes(q))
        : products;

      return (
        <div className="animate-fadeIn">
          {/* 히어로 */}
          <div className="rounded-3xl bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 text-white px-6 sm:px-10 py-10 sm:py-14 mb-8">
            <p className="text-indigo-300 font-semibold tracking-widest text-xs sm:text-sm">MEN'S CLOTHING</p>
            <h1 className="text-3xl sm:text-4xl font-extrabold mt-2">데일리로 완성하는 남자의 옷장</h1>
            <p className="text-slate-300 mt-3 text-sm sm:text-base">셔츠부터 아우터까지 · 로그인 없이 둘러보고, 마음에 들면 장바구니에 담아보세요.</p>
          </div>

          {/* 제목 + 검색창 */}
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
            <h2 className="text-xl font-bold text-slate-800">
              🧾 {q ? '검색 결과' : '전체 상품'} <span className="text-slate-400 text-base font-medium">({filtered.length})</span>
            </h2>
            <div className="relative w-full sm:w-80">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">🔍</span>
              <input type="search" value={query} onChange={(e) => setQuery(e.target.value)}
                placeholder="상품명·설명 검색 (예: 셔츠, 니트)"
                className="w-full pl-9 pr-9 py-2.5 rounded-xl border border-slate-200 bg-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-300 transition" />
              {query && (
                <button onClick={() => setQuery('')} aria-label="검색어 지우기"
                  className="absolute right-2.5 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full text-slate-400 hover:bg-slate-100 hover:text-slate-600 flex items-center justify-center">✕</button>
              )}
            </div>
          </div>

          <Banner tone="error" message={error} onClose={() => setError('')} />

          {loading ? (
            <Spinner label="상품을 불러오는 중..." />
          ) : filtered.length === 0 ? (
            <div className="text-center py-16 bg-white rounded-2xl border border-slate-100">
              <div className="text-5xl mb-3">🔍</div>
              <p className="text-slate-500 text-sm">'<b className="text-slate-700">{query.trim()}</b>' 검색 결과가 없어요.</p>
              <div className="mt-4"><Button variant="secondary" onClick={() => setQuery('')}>전체 상품 보기</Button></div>
            </div>
          ) : (
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-5">
              {filtered.map((p) => (
                <ProductCard key={p.id} p={p} onAdd={onAdd} adding={addingId === p.id}
                  stat={stats[p.id]} onRate={rate} ratingBusy={ratingBusy === p.id} />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // 🛒 내 장바구니 (로그인 필수)
    // ============================================================
    function CartView({ onCartChange, onShop, onToast }) {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [busyId, setBusyId] = useState(null);
      const [ordering, setOrdering] = useState(false);

      const load = useCallback(async () => {
        setLoading(true); setError('');
        const { data, error } = await db.from('cart').select(CART_SELECT).order('created_at');
        if (error) setError(friendly(error));
        else setItems((data || []).filter((r) => r.products)); // 상품이 삭제된 항목 방어
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      const changeQty = async (item, delta) => {
        const next = item.quantity + delta;
        if (next < 1) return;
        setBusyId(item.id); setError('');
        // 낙관적 업데이트
        setItems((prev) => prev.map((i) => (i.id === item.id ? { ...i, quantity: next } : i)));
        const { error } = await db.from('cart').update({ quantity: next }).eq('id', item.id);
        setBusyId(null);
        if (error) { setError(friendly(error)); load(); return; }
        onCartChange();
      };

      const removeItem = async (item) => {
        setBusyId(item.id); setError('');
        const { error } = await db.from('cart').delete().eq('id', item.id);
        setBusyId(null);
        if (error) { setError(friendly(error)); return; }
        setItems((prev) => prev.filter((i) => i.id !== item.id));
        onCartChange();
        onToast({ tone: 'info', msg: `🗑️ '${item.products.name}' 삭제됨` });
      };

      const clearAll = async () => {
        if (!items.length) return;
        if (!confirm('장바구니를 모두 비울까요?')) return;
        const { error } = await db.from('cart').delete().neq('id', -1); // 본인 항목 전부 (RLS)
        if (error) { setError(friendly(error)); return; }
        setItems([]); onCartChange();
        onToast({ tone: 'info', msg: '장바구니를 비웠어요' });
      };

      const total = items.reduce((s, i) => s + i.products.price * i.quantity, 0);
      const count = items.reduce((s, i) => s + i.quantity, 0);

      const handleOrder = () => {
        setOrdering(true); // "준비 중" 모달
      };

      if (loading) return <Spinner label="장바구니를 불러오는 중..." />;

      return (
        <div className="animate-fadeIn">
          <div className="flex items-center justify-between mb-5">
            <h2 className="text-2xl font-extrabold text-slate-800">🛒 내 장바구니</h2>
            {items.length > 0 && (
              <button onClick={clearAll} className="text-sm text-slate-400 hover:text-red-500">전체 비우기</button>
            )}
          </div>

          <Banner tone="error" message={error} onClose={() => setError('')} />

          {items.length === 0 ? (
            <div className="text-center py-16 bg-white rounded-2xl border border-slate-100">
              <div className="text-5xl mb-3">🛒</div>
              <p className="text-slate-400 text-sm">장바구니가 비어 있어요.</p>
              <div className="mt-4"><Button variant="accent" onClick={onShop}>상품 담으러 가기</Button></div>
            </div>
          ) : (
            <div className="grid lg:grid-cols-3 gap-6 items-start">
              {/* 목록 */}
              <ul className="lg:col-span-2 space-y-3">
                {items.map((item) => (
                  <li key={item.id} className="bg-white rounded-2xl border border-slate-100 p-3 sm:p-4 flex gap-3 sm:gap-4 items-center">
                    <img src={item.products.image_url} alt={item.products.name}
                      className="w-20 h-20 sm:w-24 sm:h-24 rounded-xl object-cover flex-none bg-slate-100" />
                    <div className="flex-1 min-w-0">
                      <h3 className="font-bold text-slate-800 truncate">{item.products.name}</h3>
                      <p className="text-sm text-slate-400">{won(item.products.price)}</p>
                      {/* 수량 조절 */}
                      <div className="mt-2 inline-flex items-center rounded-lg border border-slate-200 overflow-hidden">
                        <button onClick={() => changeQty(item, -1)} disabled={busyId === item.id || item.quantity <= 1}
                          className="px-3 py-1.5 text-slate-600 hover:bg-slate-100 disabled:opacity-40 disabled:hover:bg-white">−</button>
                        <span className="px-4 py-1.5 text-sm font-semibold text-slate-800 min-w-[2.5rem] text-center">{item.quantity}</span>
                        <button onClick={() => changeQty(item, 1)} disabled={busyId === item.id}
                          className="px-3 py-1.5 text-slate-600 hover:bg-slate-100 disabled:opacity-40">+</button>
                      </div>
                    </div>
                    <div className="flex flex-col items-end gap-2 flex-none">
                      <span className="font-extrabold text-slate-900">{won(item.products.price * item.quantity)}</span>
                      <button onClick={() => removeItem(item)} disabled={busyId === item.id}
                        className="text-xs text-slate-400 hover:text-red-500">🗑️ 삭제</button>
                    </div>
                  </li>
                ))}
              </ul>

              {/* 합계 / 주문 */}
              <div className="lg:sticky lg:top-24 bg-white rounded-2xl border border-slate-100 p-5">
                <h3 className="font-bold text-slate-800 mb-4">결제 요약</h3>
                <div className="space-y-2 text-sm">
                  <div className="flex justify-between text-slate-500">
                    <span>상품 수량</span><span>{count}개</span>
                  </div>
                  <div className="flex justify-between text-slate-500">
                    <span>배송비</span><span className="text-emerald-600 font-medium">무료</span>
                  </div>
                  <div className="border-t border-slate-100 my-3"></div>
                  <div className="flex justify-between items-baseline">
                    <span className="font-bold text-slate-800">총 합계</span>
                    <span className="text-2xl font-extrabold text-indigo-600">{won(total)}</span>
                  </div>
                </div>
                <Button variant="accent" size="lg" onClick={handleOrder} className="w-full mt-5">주문하기</Button>
                <p className="text-center text-xs text-slate-400 mt-3">결제 없이 담기·관리만 가능한 데모입니다.</p>
              </div>
            </div>
          )}

          {/* 주문하기 → 준비 중 안내 */}
          <Modal open={ordering} onClose={() => setOrdering(false)}>
            <div className="text-center">
              <div className="text-5xl mb-3">🚧</div>
              <h3 className="text-lg font-bold text-slate-800">주문 기능 준비 중이에요</h3>
              <p className="text-sm text-slate-500 mt-2">
                결제·주문 기능은 현재 <b>준비 중</b>입니다.<br />조금만 기다려 주세요!
              </p>
              <Button variant="primary" onClick={() => setOrdering(false)} className="w-full mt-5">확인</Button>
            </div>
          </Modal>
        </div>
      );
    }

    // ============================================================
    // 🚀 App
    // ============================================================
    function App() {
      const [session, setSession] = useState(undefined); // undefined = 확인 중
      const [view, setView] = useState('shop');          // 'shop' | 'cart' | 'auth'
      const [authReason, setAuthReason] = useState('');
      const [cartCount, setCartCount] = useState(0);
      const [addingId, setAddingId] = useState(null);
      const [toast, setToast] = useState(null);
      const afterAuth = useRef('shop');

      const showToast = useCallback((t) => {
        setToast(t);
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(() => setToast(null), 2200);
      }, []);

      // 세션 구독
      useEffect(() => {
        db.auth.getSession().then(({ data }) => setSession(data.session));
        const { data: sub } = db.auth.onAuthStateChange((event, s) => {
          setSession(s);
          if (event === 'SIGNED_IN') { setView(afterAuth.current || 'shop'); afterAuth.current = 'shop'; setAuthReason(''); }
          if (event === 'SIGNED_OUT') { setView('shop'); setCartCount(0); }
        });
        return () => sub.subscription.unsubscribe();
      }, []);

      // 장바구니 개수 새로고침
      const refreshCart = useCallback(async () => {
        if (!session) { setCartCount(0); return; }
        const { data } = await db.from('cart').select('quantity');
        setCartCount((data || []).reduce((s, r) => s + r.quantity, 0));
      }, [session]);

      useEffect(() => { refreshCart(); }, [refreshCart]);

      const goAuth = (reason, after = 'shop') => { afterAuth.current = after; setAuthReason(reason || ''); setView('auth'); };

      // 장바구니 담기 (로그인 필수)
      const handleAdd = async (product) => {
        if (!session) {
          showToast({ tone: 'info', msg: '🔒 로그인이 필요해요' });
          goAuth('장바구니를 사용하려면 로그인해 주세요.', 'shop');
          return;
        }
        setAddingId(product.id);
        try {
          const { data: existing } = await db.from('cart')
            .select('id, quantity').eq('product_id', product.id).maybeSingle();
          if (existing) {
            const { error } = await db.from('cart').update({ quantity: existing.quantity + 1 }).eq('id', existing.id);
            if (error) throw error;
          } else {
            // user_id 는 DB 기본값 auth.uid() 로 채워짐 (RLS: 본인만 담기 가능)
            const { error } = await db.from('cart').insert({ product_id: product.id, quantity: 1 });
            if (error) throw error;
          }
          await refreshCart();
          showToast({ tone: 'success', msg: `🛒 '${product.name}' 담았어요!` });
        } catch (err) {
          showToast({ tone: 'error', msg: friendly(err) });
        } finally {
          setAddingId(null);
        }
      };

      const goCart = () => {
        if (!session) { goAuth('내 장바구니를 보려면 로그인해 주세요.', 'cart'); return; }
        setView('cart');
      };

      if (session === undefined) {
        return <div className="min-h-screen flex items-center justify-center"><Spinner label="불러오는 중..." /></div>;
      }

      return (
        <div className="min-h-screen">
          {/* 상단바 */}
          <header className="sticky top-0 z-30 bg-white/90 backdrop-blur border-b border-slate-100">
            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
              <button onClick={() => setView('shop')} className="font-extrabold text-slate-900 flex items-center gap-1.5 text-lg">
                <span className="text-xl">🛍️</span> MEN'S SHOP
              </button>
              <div className="flex items-center gap-2 sm:gap-3">
                {/* 장바구니 버튼 */}
                <button onClick={goCart}
                  className="relative px-3 py-2 rounded-xl hover:bg-slate-100 transition text-sm font-semibold text-slate-700 flex items-center gap-1.5">
                  🛒 <span className="hidden sm:inline">장바구니</span>
                  {cartCount > 0 && (
                    <span className="absolute -top-1 -right-1 min-w-[1.25rem] h-5 px-1 rounded-full bg-indigo-600 text-white text-[11px] font-bold flex items-center justify-center">
                      {cartCount}
                    </span>
                  )}
                </button>
                {/* 로그인 상태 */}
                {session ? (
                  <div className="flex items-center gap-2">
                    <span className="text-sm text-slate-500 hidden sm:inline max-w-[10rem] truncate">
                      {session.user.email}
                    </span>
                    <Button variant="ghost" size="sm" onClick={() => db.auth.signOut()}>로그아웃</Button>
                  </div>
                ) : (
                  <Button variant="accent" size="sm" onClick={() => goAuth('', 'shop')}>로그인</Button>
                )}
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-6 sm:py-8">
            {view === 'shop' && (
              <ProductGrid onAdd={handleAdd} addingId={addingId} session={session} onToast={showToast}
                onNeedLogin={(reason) => { showToast({ tone: 'info', msg: '🔒 로그인이 필요해요' }); goAuth(reason, 'shop'); }} />
            )}
            {view === 'cart' && session && (
              <CartView onCartChange={refreshCart} onShop={() => setView('shop')} onToast={showToast} />
            )}
            {view === 'auth' && (
              <AuthScreen reason={authReason} onBack={() => { setAuthReason(''); setView('shop'); }} />
            )}
          </main>

          <footer className="max-w-6xl mx-auto px-4 py-10 text-center text-xs text-slate-300">
            🛍️ MEN'S SHOP · 상품(공개) → 장바구니(로그인) → 관리 → 합계 · Supabase Auth + RLS
          </footer>

          <Toast toast={toast} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
