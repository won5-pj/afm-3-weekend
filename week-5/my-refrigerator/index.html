<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧊 냉장고 & 레시피 매니저</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ 모든 CDN 버전 고정. Babel 은 반드시 7.x (8.x 는 인라인 text/babel 미지원). -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.25s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slideDown { animation: slideDown 0.3s ease-out; }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 via-white to-emerald-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ========================================
    // ⚙️ 설정 / API 헬퍼 (Express + Postgres 백엔드, 같은 origin)
    // ========================================
    const API_BASE_URL = '/api';

    async function apiRequest(path, options = {}) {
      const res = await fetch(`${API_BASE_URL}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (!res.ok) {
        let msg = `요청 실패 (HTTP ${res.status})`;
        try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {}
        throw new Error(msg);
      }
      if (res.status === 204) return null;
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    // ========================================
    // ⚙️ 도메인 상수 / 유틸
    // ========================================
    const CATEGORIES = ['냉장', '냉동', '실온'];
    const CATEGORY_STYLE = {
      '냉장': 'bg-sky-100 text-sky-700 border-sky-200',
      '냉동': 'bg-indigo-100 text-indigo-700 border-indigo-200',
      '실온': 'bg-amber-100 text-amber-700 border-amber-200',
    };
    const CATEGORY_EMOJI = { '냉장': '🧊', '냉동': '❄️', '실온': '🌡️' };

    const DIFFICULTIES = ['쉬움', '보통', '어려움'];
    const DIFFICULTY_STYLE = {
      '쉬움': 'bg-green-100 text-green-700 border-green-200',
      '보통': 'bg-amber-100 text-amber-700 border-amber-200',
      '어려움': 'bg-red-100 text-red-700 border-red-200',
    };

    // 유통기한(YYYY-MM-DD) → D-day 배지 정보. 없으면 null
    function expiryStatus(dateStr) {
      if (!dateStr) return null;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const due = new Date(`${dateStr}T00:00:00`);
      if (isNaN(due.getTime())) return null;
      const days = Math.round((due - today) / 86400000);
      if (days < 0) return { label: `유통기한 ${-days}일 지남`, style: 'bg-red-100 text-red-700 border-red-200' };
      if (days === 0) return { label: '오늘까지', style: 'bg-red-100 text-red-700 border-red-200' };
      if (days <= 3) return { label: `D-${days} (${dateStr})`, style: 'bg-amber-100 text-amber-700 border-amber-200' };
      return { label: `~${dateStr} (D-${days})`, style: 'bg-gray-100 text-gray-600 border-gray-200' };
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (순수 프레젠테이션)
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled, onClick, type = 'button', className = '', children }) {
      const base = 'inline-flex items-center justify-center gap-1.5 font-semibold rounded-xl transition-all focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-emerald-500 hover:bg-emerald-600 text-white focus:ring-emerald-300 shadow-sm',
        secondary: 'bg-white hover:bg-gray-50 text-gray-700 border border-gray-200 focus:ring-gray-200',
        danger: 'bg-white hover:bg-red-50 text-red-500 border border-red-200 focus:ring-red-200',
        ghost: 'bg-transparent hover:bg-gray-100 text-gray-500 focus:ring-gray-200',
      };
      const sizes = { sm: 'px-2.5 py-1 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-5 py-2.5 text-base' };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, disabled, className = '', ...rest }) {
      return (
        <label className={`block ${className}`}>
          {label && <span className="block mb-1 text-sm font-medium text-gray-600">{label}</span>}
          <input
            value={value} onChange={onChange} placeholder={placeholder} disabled={disabled}
            className="w-full px-3 py-2 rounded-xl border border-gray-200 bg-white text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-300 focus:border-emerald-300 transition disabled:bg-gray-100"
            {...rest}
          />
        </label>
      );
    }

    function Textarea({ label, value, onChange, placeholder, rows = 3, disabled, className = '' }) {
      return (
        <label className={`block ${className}`}>
          {label && <span className="block mb-1 text-sm font-medium text-gray-600">{label}</span>}
          <textarea
            value={value} onChange={onChange} placeholder={placeholder} rows={rows} disabled={disabled}
            className="w-full px-3 py-2 rounded-xl border border-gray-200 bg-white text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-300 focus:border-emerald-300 transition resize-y disabled:bg-gray-100"
          />
        </label>
      );
    }

    function Select({ label, value, onChange, options, disabled, className = '' }) {
      return (
        <label className={`block ${className}`}>
          {label && <span className="block mb-1 text-sm font-medium text-gray-600">{label}</span>}
          <select
            value={value} onChange={onChange} disabled={disabled}
            className="w-full px-3 py-2 rounded-xl border border-gray-200 bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-300 focus:border-emerald-300 transition disabled:bg-gray-100">
            {options.map((o) => <option key={o} value={o}>{o}</option>)}
          </select>
        </label>
      );
    }

    function Card({ className = '', children }) {
      return <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>{children}</div>;
    }

    function Badge({ className = '', children }) {
      return <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold border ${className}`}>{children}</span>;
    }

    function Spinner({ label = '불러오는 중...' }) {
      return (
        <div className="flex flex-col items-center justify-center py-12 text-gray-400">
          <svg className="animate-spin h-8 w-8 mb-2 text-emerald-400" viewBox="0 0 24 24" fill="none">
            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z" />
          </svg>
          <span className="text-sm">{label}</span>
        </div>
      );
    }

    function EmptyState({ emoji = '📭', text }) {
      return (
        <div className="text-center py-12 text-gray-400">
          <div className="text-4xl mb-2">{emoji}</div>
          <p className="text-sm">{text}</p>
        </div>
      );
    }

    function ErrorBanner({ message, onRetry, onDismiss }) {
      if (!message) return null;
      return (
        <div className="animate-slideDown flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm">
          <span className="text-lg leading-none">⚠️</span>
          <div className="flex-1">
            <p className="font-semibold">문제가 발생했어요</p>
            <p className="text-red-600/90">{message}</p>
          </div>
          <div className="flex gap-2 shrink-0">
            {onRetry && <button onClick={onRetry} className="text-red-600 hover:text-red-800 font-semibold underline">다시 시도</button>}
            {onDismiss && <button onClick={onDismiss} className="text-red-400 hover:text-red-600" aria-label="닫기">✕</button>}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 공통 레이아웃 컴포넌트
    // ========================================
    function Header() {
      return (
        <header className="text-center mb-6">
          <h1 className="text-3xl sm:text-4xl font-extrabold tracking-tight text-gray-800">
            🧊 냉장고 & 레시피 매니저 🍳
          </h1>
          <p className="mt-2 text-gray-500 text-sm sm:text-base">자취생을 위한 냉장고 재료 & 레시피 정리 앱</p>
        </header>
      );
    }

    function Tabs({ active, onChange, tabs }) {
      return (
        <div className="flex gap-2 p-1 bg-white/70 backdrop-blur rounded-2xl border border-gray-100 shadow-sm mb-6 max-w-md mx-auto">
          {tabs.map((t) => (
            <button key={t.key} onClick={() => onChange(t.key)}
              className={`flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all ${
                active === t.key ? 'bg-emerald-500 text-white shadow' : 'text-gray-500 hover:bg-gray-100'
              }`}>
              {t.label}
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 📄 재료 관리 페이지
    // ========================================
    function IngredientsSection() {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [name, setName] = useState('');
      const [category, setCategory] = useState('냉장');
      const [expiry, setExpiry] = useState('');
      const [submitting, setSubmitting] = useState(false);

      const load = useCallback(async () => {
        setLoading(true); setError('');
        try {
          const data = await apiRequest('/ingredients');
          setItems(Array.isArray(data) ? data : []);
        } catch (e) {
          setError(e.message || '재료 목록을 불러오지 못했습니다.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleAdd = async (e) => {
        e.preventDefault();
        const trimmed = name.trim();
        if (!trimmed) { alert('재료명을 입력해 주세요.'); return; }
        setSubmitting(true);
        try {
          await apiRequest('/ingredients', {
            method: 'POST',
            body: JSON.stringify({ name: trimmed, category: (category || '냉장').trim(), expiry_date: expiry || null }),
          });
          setName(''); setCategory('냉장'); setExpiry('');
          await load();
        } catch (e) {
          alert(`재료 추가 실패: ${e.message}`);
        } finally {
          setSubmitting(false);
        }
      };

      const handleDelete = async (id, itemName) => {
        if (!confirm(`'${itemName}' 재료를 삭제할까요?`)) return;
        try {
          await apiRequest(`/ingredients/${id}`, { method: 'DELETE' });
          await load();
        } catch (e) {
          alert(`삭제 실패: ${e.message}`);
        }
      };

      return (
        <div className="grid gap-6 lg:grid-cols-5 items-start">
          {/* 입력 폼 */}
          <Card className="p-5 lg:col-span-2 lg:sticky lg:top-4">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">🥕 재료 추가</h2>
            <form onSubmit={handleAdd} className="space-y-4">
              <Input label="재료명" value={name} onChange={(e) => setName(e.target.value)}
                placeholder="예) 계란, 우유, 양파" disabled={submitting} />
              <div>
                <Select label="카테고리" value={CATEGORIES.includes(category) ? category : ''}
                  onChange={(e) => setCategory(e.target.value)} disabled={submitting}
                  options={CATEGORIES.concat(CATEGORIES.includes(category) || !category ? [] : [category])} />
                <p className="mt-1.5 text-xs text-gray-400">직접 입력하려면 아래 칸에 자유롭게 적어도 돼요.</p>
                <input value={category} onChange={(e) => setCategory(e.target.value)} disabled={submitting}
                  placeholder="직접 입력 (선택)"
                  className="mt-1.5 w-full px-3 py-1.5 text-sm rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-300 disabled:bg-gray-100" />
              </div>
              <Input label="유통기한 (선택)" type="date" value={expiry} onChange={(e) => setExpiry(e.target.value)} disabled={submitting} />
              <Button type="submit" size="lg" className="w-full" disabled={submitting}>
                {submitting ? '추가 중...' : '➕ 추가'}
              </Button>
            </form>
          </Card>

          {/* 목록 */}
          <div className="lg:col-span-3 space-y-4">
            <div className="flex items-center justify-between">
              <h2 className="text-lg font-bold text-gray-800">📋 재료 목록 {!loading && <span className="text-gray-400 text-sm font-normal">({items.length})</span>}</h2>
              <Button variant="secondary" size="sm" onClick={load} disabled={loading}>🔄 새로고침</Button>
            </div>
            <ErrorBanner message={error} onRetry={load} onDismiss={() => setError('')} />
            {loading ? (
              <Spinner label="재료를 불러오는 중..." />
            ) : items.length === 0 && !error ? (
              <EmptyState emoji="🧊" text="등록된 재료가 없습니다. 첫 재료를 추가해 보세요!" />
            ) : (
              <div className="grid gap-3 sm:grid-cols-2">
                {items.map((it) => (
                  <Card key={it.id} className="p-4 flex items-center justify-between animate-fadeIn hover:shadow-md transition-shadow">
                    <div className="min-w-0">
                      <p className="font-semibold text-gray-800 truncate">{it.name}</p>
                      <div className="mt-1.5 flex flex-wrap items-center gap-2">
                        <Badge className={CATEGORY_STYLE[it.category] || 'bg-gray-100 text-gray-600 border-gray-200'}>
                          {CATEGORY_EMOJI[it.category] || '📦'} {it.category || '기타'}
                        </Badge>
                        {(() => {
                          const e = expiryStatus(it.expiry_date);
                          return e ? <Badge className={e.style}>📅 {e.label}</Badge> : null;
                        })()}
                      </div>
                    </div>
                    <Button variant="danger" size="sm" onClick={() => handleDelete(it.id, it.name)}>🗑️ 삭제</Button>
                  </Card>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 레시피 카드 (펼치기/접기)
    // ========================================
    function RecipeCard({ recipe, onDelete }) {
      const [open, setOpen] = useState(false);
      const stepsText = (recipe.steps || '').trim();
      return (
        <Card className="p-5 animate-fadeIn hover:shadow-md transition-shadow">
          <div className="flex items-start justify-between gap-3">
            <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 min-w-0">
              🍳 <span className="truncate">{recipe.title}</span>
            </h3>
            <Button variant="danger" size="sm" onClick={() => onDelete(recipe.id, recipe.title)}>🗑️ 삭제</Button>
          </div>

          {(recipe.cook_time || recipe.difficulty) && (
            <div className="mt-2 flex flex-wrap items-center gap-2">
              {recipe.cook_time && (
                <Badge className="bg-sky-100 text-sky-700 border-sky-200">⏱️ {recipe.cook_time}</Badge>
              )}
              {recipe.difficulty && (
                <Badge className={DIFFICULTY_STYLE[recipe.difficulty] || 'bg-gray-100 text-gray-600 border-gray-200'}>
                  📊 난이도: {recipe.difficulty}
                </Badge>
              )}
            </div>
          )}

          <div className="mt-3">
            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">재료</p>
            <p className="text-sm text-gray-700 whitespace-pre-wrap">{(recipe.ingredients || '').trim() || '—'}</p>
          </div>

          <div className="mt-3">
            <button onClick={() => setOpen((v) => !v)}
              className="w-full flex items-center justify-between text-left text-xs font-semibold text-gray-400 uppercase tracking-wide hover:text-emerald-500 transition">
              <span>조리법</span>
              <span className="text-sm">{open ? '▲ 접기' : '▼ 펼치기'}</span>
            </button>
            {open ? (
              <p className="mt-2 text-sm text-gray-700 whitespace-pre-wrap animate-slideDown">{stepsText || '—'}</p>
            ) : (
              <p className="mt-2 text-sm text-gray-500 overflow-hidden">
                {(stepsText || '조리법이 없습니다.').slice(0, 80)}
                {stepsText.length > 80 ? '…' : ''}
              </p>
            )}
          </div>
        </Card>
      );
    }

    // ========================================
    // 📄 레시피 관리 페이지
    // ========================================
    function RecipesSection() {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [title, setTitle] = useState('');
      const [ingredientsText, setIngredientsText] = useState('');
      const [steps, setSteps] = useState('');
      const [cookTime, setCookTime] = useState('');
      const [difficulty, setDifficulty] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [suggesting, setSuggesting] = useState(false);

      const load = useCallback(async () => {
        setLoading(true); setError('');
        try {
          const data = await apiRequest('/recipes');
          setItems(Array.isArray(data) ? data : []);
        } catch (e) {
          setError(e.message || '레시피 목록을 불러오지 못했습니다.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { load(); }, [load]);

      // 냉장고에 저장된 재료를 바탕으로 Gemini AI가 레시피 초안을 생성해 폼에 채운다
      const handleSuggest = async () => {
        setSuggesting(true);
        try {
          const draft = await apiRequest('/recipes/ai-suggest', { method: 'POST' });
          setTitle(draft.title || '');
          setIngredientsText(draft.ingredients || '');
          setSteps(draft.steps || '');
          setCookTime(draft.cook_time || '');
          setDifficulty(DIFFICULTIES.includes(draft.difficulty) ? draft.difficulty : '');
        } catch (e) {
          alert(`AI 레시피 생성 실패: ${e.message}`);
        } finally {
          setSuggesting(false);
        }
      };

      const handleSave = async (e) => {
        e.preventDefault();
        const t = title.trim();
        if (!t) { alert('요리명을 입력해 주세요.'); return; }
        setSubmitting(true);
        try {
          await apiRequest('/recipes', {
            method: 'POST',
            body: JSON.stringify({
              title: t,
              ingredients: ingredientsText.trim(),
              steps: steps.trim(),
              cook_time: cookTime.trim() || null,
              difficulty: DIFFICULTIES.includes(difficulty) ? difficulty : null,
            }),
          });
          setTitle(''); setIngredientsText(''); setSteps(''); setCookTime(''); setDifficulty('');
          await load();
        } catch (e) {
          alert(`레시피 저장 실패: ${e.message}`);
        } finally {
          setSubmitting(false);
        }
      };

      const handleDelete = async (id, t) => {
        if (!confirm(`'${t}' 레시피를 삭제할까요?`)) return;
        try {
          await apiRequest(`/recipes/${id}`, { method: 'DELETE' });
          await load();
        } catch (e) {
          alert(`삭제 실패: ${e.message}`);
        }
      };

      return (
        <div className="grid gap-6 lg:grid-cols-5 items-start">
          {/* 입력 폼 */}
          <Card className="p-5 lg:col-span-2 lg:sticky lg:top-4">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">📝 레시피 메모</h2>

            {/* 냉장고 재료 기반 Gemini AI 레시피 생성 */}
            <div className="mb-4 p-3 rounded-xl bg-emerald-50 border border-emerald-100">
              <p className="text-sm text-emerald-800 mb-1">✨ Gemini AI가 냉장고 재료로 레시피를 만들어 폼에 채워드려요.</p>
              <p className="text-xs text-emerald-600/80 mb-2">* 채워진 내용을 자유롭게 고쳐서 저장하세요.</p>
              <Button variant="secondary" size="md" className="w-full !bg-emerald-500 !text-white hover:!bg-emerald-600"
                onClick={handleSuggest} disabled={suggesting}>
                {suggesting ? '✨ AI가 생각하는 중...' : '✨ AI로 레시피 생성'}
              </Button>
            </div>

            <div className="relative my-3 text-center">
              <span className="text-xs text-gray-400 bg-white px-2">또는 직접 작성</span>
            </div>

            <form onSubmit={handleSave} className="space-y-4">
              <Input label="요리명" value={title} onChange={(e) => setTitle(e.target.value)}
                placeholder="예) 김치볶음밥" disabled={submitting} />
              <Textarea label="재료" value={ingredientsText} onChange={(e) => setIngredientsText(e.target.value)}
                placeholder={"필요한 재료를 줄바꿈으로 적어주세요.\n예)\n밥 1공기\n김치 한 줌\n계란 1개"} rows={4} disabled={submitting} />
              <Textarea label="조리법" value={steps} onChange={(e) => setSteps(e.target.value)}
                placeholder={"조리 순서를 적어주세요.\n예)\n1. 팬에 기름을 두른다\n2. 김치를 볶는다\n3. 밥을 넣고 볶는다"} rows={5} disabled={submitting} />
              <div className="grid grid-cols-2 gap-3">
                <Input label="조리시간 (선택)" value={cookTime} onChange={(e) => setCookTime(e.target.value)}
                  placeholder="예) 약 15분" disabled={submitting} />
                <Select label="난이도 (선택)" value={difficulty} onChange={(e) => setDifficulty(e.target.value)}
                  options={['', ...DIFFICULTIES]} disabled={submitting} />
              </div>
              <Button type="submit" size="lg" className="w-full" disabled={submitting}>
                {submitting ? '저장 중...' : '💾 저장'}
              </Button>
            </form>
          </Card>

          {/* 목록 */}
          <div className="lg:col-span-3 space-y-4">
            <div className="flex items-center justify-between">
              <h2 className="text-lg font-bold text-gray-800">📚 레시피 목록 {!loading && <span className="text-gray-400 text-sm font-normal">({items.length})</span>}</h2>
              <Button variant="secondary" size="sm" onClick={load} disabled={loading}>🔄 새로고침</Button>
            </div>
            <ErrorBanner message={error} onRetry={load} onDismiss={() => setError('')} />
            {loading ? (
              <Spinner label="레시피를 불러오는 중..." />
            ) : items.length === 0 && !error ? (
              <EmptyState emoji="🍽️" text="저장된 레시피가 없습니다. 나만의 레시피를 기록해 보세요!" />
            ) : (
              <div className="grid gap-4">
                {items.map((r) => <RecipeCard key={r.id} recipe={r} onDelete={handleDelete} />)}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [tab, setTab] = useState('ingredients');

      return (
        <div className="max-w-5xl mx-auto px-4 py-8">
          <Header />
          <Tabs active={tab} onChange={setTab} tabs={[
            { key: 'ingredients', label: '🥕 냉장고 재료' },
            { key: 'recipes', label: '🍳 레시피' },
          ]} />
          <main>
            {tab === 'ingredients' ? <IngredientsSection /> : <RecipesSection />}
          </main>
          <footer className="mt-12 text-center text-xs text-gray-400">
            🧊 냉장고 & 레시피 매니저 · 같은 서버(<code>/api</code>)의 REST API 사용
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
