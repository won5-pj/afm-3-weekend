<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");
  @font-face{ font-family:"PretendardLocal"; src:url("fonts/Pretendard-Black.woff2") format("woff2"); font-weight:900; }
  @font-face{ font-family:"PretendardLocal"; src:url("fonts/Pretendard-ExtraBold.woff2") format("woff2"); font-weight:800; }

  :root{
    --green:#00C471;        /* 성장 · 토스풍 프레시 그린 (강조 포인트) */
    --green-deep:#0E3B2E;   /* 딥 그린 (텍스트) */
    --ink:#111A16;          /* 본문 진한 잉크 */
    --muted:#6B7B72;        /* 보조 텍스트 */
    --line:#E7EFEA;         /* 구분선 */
    --mint:#F4FBF7;         /* 배경 민트 화이트 */
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:#cfd8d2; }
  body{ font-family:"Pretendard","PretendardLocal","Malgun Gothic",-apple-system,sans-serif;
        -webkit-font-smoothing:antialiased; }

  .card{
    position:relative; width:1800px; height:1080px; overflow:hidden;
    background:
      radial-gradient(1200px 700px at 88% 118%, rgba(0,196,113,.10), transparent 60%),
      linear-gradient(180deg,#FFFFFF 0%, var(--mint) 100%);
  }
  /* 좌측 성장 액센트 바 */
  .edge{ position:absolute; left:0; top:0; width:18px; height:100%;
         background:linear-gradient(180deg,var(--green),#00A862); }

  /* 배경 성장 그래프 (우하단) */
  .growth{ position:absolute; right:0; bottom:0; width:960px; height:760px; opacity:.9; }

  .pad{ position:absolute; inset:0; padding:120px 130px; display:flex; flex-direction:column;
        justify-content:space-between; }

  /* 헤더: 모노그램 + 이름/직함 */
  .head{ display:flex; align-items:center; gap:34px; }
  .mono{ width:118px; height:118px; border-radius:30px;
         background:linear-gradient(145deg,var(--green),#00A862);
         display:flex; align-items:center; justify-content:center;
         color:#fff; font-weight:900; font-size:58px; letter-spacing:-2px;
         box-shadow:0 18px 40px rgba(0,196,113,.35); }
  .who .name{ font-weight:900; font-size:70px; color:var(--ink); letter-spacing:-2px; line-height:1; }
  .who .name .en{ font-size:34px; color:var(--muted); font-weight:700; margin-left:18px; letter-spacing:1px; }
  .who .role{ margin-top:14px; font-size:34px; color:var(--green-deep); font-weight:700; }
  .who .role .dot{ color:var(--green); margin:0 12px; }

  /* 중앙 히어로: 강조 포인트 1개 = 성장 */
  .hero{ }
  .kicker{ font-size:38px; color:var(--muted); font-weight:600; letter-spacing:-.5px; }
  .word{ display:flex; align-items:baseline; gap:34px; margin-top:6px; }
  .word .big{ font-family:"Pretendard","PretendardLocal",sans-serif; font-weight:900;
              font-size:340px; line-height:.86; letter-spacing:-14px; color:var(--green);
              text-shadow:0 24px 60px rgba(0,196,113,.28); }
  .word .cn{ font-size:96px; font-weight:800; color:#BFE9D4; letter-spacing:0; }
  .en-sub{ margin-top:26px; font-size:44px; font-weight:800; color:var(--green-deep);
           letter-spacing:6px; }
  .en-sub small{ display:block; font-size:30px; font-weight:600; color:var(--muted);
                 letter-spacing:-.3px; margin-top:12px; }

  /* 하단 연락처 */
  .foot{ display:flex; align-items:flex-end; justify-content:space-between; }
  .contacts{ display:flex; flex-direction:column; gap:20px; }
  .ci{ display:flex; align-items:center; gap:20px; font-size:36px; color:var(--ink); font-weight:600; }
  .ci .ico{ width:52px; height:52px; border-radius:14px; background:#E9F8F0;
            display:flex; align-items:center; justify-content:center; font-size:26px; }
  .tag{ align-self:flex-end; font-size:28px; font-weight:800; color:var(--green);
        letter-spacing:4px; border:2px solid #BFE9D4; border-radius:999px; padding:14px 30px;
        background:#fff; }
</style>
</head>
<body>
  <div class="card">
    <div class="edge"></div>

    <!-- 배경 성장 그래프: 상승하는 바 + 라인 + 새싹 -->
    <svg class="growth" viewBox="0 0 960 760" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0" stop-color="#00C471" stop-opacity=".10"/>
          <stop offset="1" stop-color="#00C471" stop-opacity=".22"/>
        </linearGradient>
        <linearGradient id="ln" x1="0" y1="1" x2="1" y2="0">
          <stop offset="0" stop-color="#00C471"/>
          <stop offset="1" stop-color="#00A862"/>
        </linearGradient>
      </defs>
      <!-- 상승 바 -->
      <rect x="120" y="560" width="110" height="200" rx="26" fill="url(#bar)"/>
      <rect x="300" y="470" width="110" height="290" rx="26" fill="url(#bar)"/>
      <rect x="480" y="360" width="110" height="400" rx="26" fill="url(#bar)"/>
      <rect x="660" y="230" width="110" height="530" rx="26" fill="url(#bar)"/>
      <!-- 상승 라인 -->
      <path d="M120 600 L355 505 L535 395 L735 250" stroke="url(#ln)" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round" opacity=".55"/>
      <circle cx="120" cy="600" r="16" fill="#00C471" opacity=".55"/>
      <circle cx="355" cy="505" r="16" fill="#00C471" opacity=".55"/>
      <circle cx="535" cy="395" r="16" fill="#00C471" opacity=".55"/>
      <!-- 끝점 새싹 -->
      <g transform="translate(735 250)" opacity=".9">
        <circle r="26" fill="#00C471"/>
        <path d="M0 6 C -2 -18 -20 -26 -34 -22 C -30 -6 -14 4 0 6 Z" fill="#00A862"/>
        <path d="M0 6 C 2 -18 20 -26 34 -22 C 30 -6 14 4 0 6 Z" fill="#12D982"/>
      </g>
    </svg>

    <div class="pad">
      <!-- 헤더 -->
      <div class="head">
        <div class="mono">오</div>
        <div class="who">
          <div class="name">오상원<span class="en">OH SANG&nbsp;WON</span></div>
          <div class="role">사원<span class="dot">·</span>TLS &nbsp;LOGISTICS</div>
        </div>
      </div>

      <!-- 히어로: 강조 포인트 -->
      <div class="hero">
        <div class="kicker">나를 한 단어로 정의하면</div>
        <div class="word">
          <span class="big">성장</span>
          <span class="cn">成長</span>
        </div>
        <div class="en-sub">GROWTH
          <small>어제보다 나은 오늘 · 멈추지 않는 사람</small>
        </div>
      </div>

      <!-- 연락처 -->
      <div class="foot">
        <div class="contacts">
          <div class="ci"><span class="ico">📞</span>010-2574-8001</div>
          <div class="ci"><span class="ico">✉️</span>dennisoh.au@gmail.com</div>
          <div class="ci"><span class="ico">📍</span>서울 종로구</div>
        </div>
        <div class="tag">GROWTH &amp; PASSION</div>
      </div>
    </div>
  </div>
</body>
</html>
