<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저장된 비밀번호 보기 (React 단일 파일)</title>
  <!-- React + Babel + Tailwind 를 CDN 으로 불러옵니다 (빌드 도구 불필요) -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    function App() {
      const [password, setPassword] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [visible, setVisible] = useState(true);

      const handleFetch = async () => {
        setLoading(true);
        setError(null);
        try {
          const response = await fetch('/api/password');
          const data = await response.json();
          if (data.error) throw new Error(data.error);
          setPassword(data.password);
          setVisible(true);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-xl mx-auto mt-16 p-6">
          <h1 className="text-2xl font-bold mb-6">저장된 비밀번호 보기 (React 단일 파일)</h1>

          <button
            onClick={handleFetch}
            disabled={loading}
            className="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50"
          >
            {loading ? '읽는 중...' : '🔓 비밀번호 보기'}
          </button>

          <div className="mt-5 p-4 bg-gray-100 rounded-lg min-h-[60px]">
            {error && <span className="text-red-600">오류 발생: {error}</span>}
            {!error && password === null && (
              <span className="text-gray-500">버튼을 누르면 서버에 저장된 비밀번호가 표시됩니다.</span>
            )}
            {!error && password !== null && (
              <div className="flex items-center justify-between gap-4">
                <span className="font-mono text-lg">
                  {visible ? password : '••••••••'}
                </span>
                <button
                  onClick={() => setVisible((v) => !v)}
                  className="px-3 py-1.5 text-sm bg-gray-200 rounded-lg hover:bg-gray-300"
                >
                  {visible ? '👁 숨기기' : '👁‍🗨 보기'}
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
