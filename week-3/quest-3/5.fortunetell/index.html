<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔮 조선 해몽소 — 꿈 풀이</title>

  <!-- ⚠️ CDN 버전 고정: Babel 은 7.x 로 고정해야 type="text/babel" 인라인 변환이 깨지지 않는다. -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <style>
    :root { --ink: #2b1d12; --hanji: #f3e7cf; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at 85% -10%, rgba(170,80,40,0.18), transparent 60%),
        radial-gradient(800px 480px at 0% 110%, rgba(60,40,20,0.22), transparent 60%),
        linear-gradient(160deg, #efe2c6 0%, #e7d4ad 55%, #dcc596 100%);
      font-family: 'Nanum Myeongjo', 'Apple SD Gothic Neo', 'Malgun Gothic', serif;
    }
    /* 한지 결 느낌의 미세한 노이즈 */
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; opacity: .06;
      background-image: repeating-linear-gradient(0deg, #3a2a18 0 1px, transparent 1px 3px),
                        repeating-linear-gradient(90deg, #3a2a18 0 1px, transparent 1px 3px);
    }
    .seal {
      font-family: serif; color: #fff; background: #b1331f;
      box-shadow: 0 4px 14px rgba(120,30,15,.35); letter-spacing: .12em;
    }
    @keyframes rise { 0% { transform: translateY(14px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    .rise { animation: rise .5s cubic-bezier(.2,.9,.3,1.2) both; }
    @keyframes glow { 0%,100% { box-shadow: 0 0 0 rgba(177,51,31,0); } 50% { box-shadow: 0 0 26px rgba(177,51,31,.35); } }
    .lantern { animation: glow 3s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    .paper {
      background: linear-gradient(180deg, #fbf3e1, #f3e7cf);
      border: 1px solid rgba(90,60,30,.25);
      box-shadow: 0 14px 40px rgba(60,40,20,.18), inset 0 1px 0 rgba(255,255,255,.5);
    }
    textarea::placeholder { color: #8a7350; }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(90,60,30,.3); border-radius: 99px; }

    /* ===== 참조 이미지(MTG 카드) 스타일 결과 카드 ===== */
    .mtg-outer {                 /* 카드 바깥의 검은 테두리 */
      background: linear-gradient(155deg, #241c12 0%, #060606 72%);
      border-radius: 22px;
      padding: 11px;
      box-shadow: 0 30px 70px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .mtg-frame {                 /* 색상 프레임(판정별로 --frame 주입) */
      background: var(--frame);
      border-radius: 14px;
      padding: 11px;
      position: relative;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.38), inset 0 2px 7px rgba(255,255,255,.22);
    }
    .mtg-plate {                 /* 타이틀/타입 라인 명판 */
      background: var(--plate);
      border-radius: 9px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.35), inset 0 1px 1px rgba(255,255,255,.55);
    }
    .mtg-art {                   /* 일러스트 창 */
      height: 186px; border-radius: 7px; overflow: hidden; position: relative;
      background: var(--art);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.5), inset 0 0 34px rgba(0,0,0,.4);
    }
    .mtg-textbox {               /* 규칙 텍스트 박스(한지) */
      background: linear-gradient(180deg, #fbf3e1, #efe1c4);
      border-radius: 9px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.3), inset 0 1px 1px rgba(255,255,255,.6);
    }
    .mtg-pt {                    /* 우하단 능력치(행운지수) 박스 */
      position: absolute; right: 4px; bottom: -8px;
      background: var(--plate);
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.4), inset 0 1px 1px rgba(255,255,255,.55);
    }
    .sparkle { position: absolute; color: rgba(255,255,255,.85); text-shadow: 0 0 8px rgba(255,255,255,.7); }
    @keyframes twinkle { 0%,100% { opacity:.25; transform: scale(.8);} 50% { opacity:1; transform: scale(1.15);} }
    .twinkle { animation: twinkle 2.6s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // 판정별 색/아이콘 테마 (참조 카드의 색상 프레임을 본떠 판정마다 톤을 달리함)
    const VERDICT_THEME = {
      '길몽': {
        emoji: '🌕', tag: '吉夢', color: '#15803d',
        frame: 'linear-gradient(160deg,#d8b25a,#7a5618)',
        plate: 'linear-gradient(180deg,#f1dda7,#cda860)',
        art:   'radial-gradient(130% 100% at 50% 0%, #ffe9ad 0%, #d29a3e 55%, #6f4d18 100%)',
      },
      '흉몽': {
        emoji: '🌑', tag: '凶夢', color: '#475569',
        frame: 'linear-gradient(160deg,#33608f,#0b1830)',
        plate: 'linear-gradient(180deg,#cadcef,#8fa9c4)',
        art:   'radial-gradient(130% 100% at 50% 0%, #4a7cb0 0%, #1a2f4f 55%, #060c18 100%)',
      },
      '반길반흉': {
        emoji: '🌗', tag: '半吉', color: '#b45309',
        frame: 'linear-gradient(160deg,#9c7a3c,#3a3340)',
        plate: 'linear-gradient(180deg,#e6d4a9,#b59a64)',
        art:   'radial-gradient(130% 100% at 50% 0%, #e9cb8c 0%, #7d5d2f 52%, #2c2730 100%)',
      },
    };
    function themeOf(v) {
      if (v && v.indexOf('길') === 0) return VERDICT_THEME['길몽'];
      if (v && v.indexOf('흉') === 0) return VERDICT_THEME['흉몽'];
      return VERDICT_THEME['반길반흉'];
    }
    // 행운지수 구간별 색 (점수 자체를 직관적으로)
    function scoreColor(s) {
      if (s >= 67) return '#15803d';   // 길함 — 초록
      if (s >= 40) return '#b8860b';   // 보통 — 황금
      return '#b1331f';                // 흉함 — 적색
    }
    function scoreWord(s) {
      if (s >= 85) return '대길(大吉)';
      if (s >= 67) return '길(吉)';
      if (s >= 40) return '평(平)';
      if (s >= 20) return '소흉(小凶)';
      return '흉(凶)';
    }

    // 행운지수 게이지 — 0에서 score 까지 차오르는 애니메이션
    function LuckGauge({ score }) {
      const [w, setW] = useState(0);
      useEffect(() => {
        const t = setTimeout(() => setW(score), 120);
        return () => clearTimeout(t);
      }, [score]);
      const col = scoreColor(score);
      return (
        <div className="paper rounded-2xl p-5 mt-4">
          <div className="flex items-end justify-between mb-2">
            <h3 className="font-bold flex items-center gap-2" style={{ color: '#5a2a14' }}>
              🍀 오늘의 행운지수
            </h3>
            <div className="flex items-baseline gap-1">
              <span className="text-3xl font-extrabold tabular-nums" style={{ color: col }}>{score}</span>
              <span className="text-sm font-semibold" style={{ color: col }}>/ 100</span>
            </div>
          </div>

          {/* 게이지 트랙 (적→황→녹 무지개) + 미도달 구간 마스크 + 바늘 */}
          <div className="relative h-3.5 rounded-full"
               style={{ background: 'linear-gradient(90deg,#b1331f 0%,#e0a93f 50%,#15803d 100%)',
                        boxShadow: 'inset 0 1px 3px rgba(0,0,0,.35)' }}>
            <div className="absolute top-0 bottom-0 right-0 rounded-r-full"
                 style={{ width: (100 - w) + '%', background: 'rgba(60,44,26,.78)',
                          transition: 'width 1s cubic-bezier(.2,.8,.3,1)' }} />
            <div className="absolute -top-1.5"
                 style={{ left: w + '%', transform: 'translateX(-50%)',
                          transition: 'left 1s cubic-bezier(.2,.8,.3,1)' }}>
              <div className="w-6 h-6 rounded-full bg-white grid place-items-center"
                   style={{ boxShadow: '0 2px 6px rgba(0,0,0,.4), inset 0 0 0 2px ' + col }}>
                <span className="text-[11px] font-bold" style={{ color: col }}>運</span>
              </div>
            </div>
          </div>

          <div className="flex justify-between mt-2 text-[11px]" style={{ color: '#8a6a3e' }}>
            <span>凶 0</span>
            <span className="font-bold" style={{ color: col }}>{scoreWord(score)}</span>
            <span>100 吉</span>
          </div>
        </div>
      );
    }

    // 예시 꿈 — 클릭하면 입력창에 채워짐
    const SAMPLES = [
      '돼지가 품에 안기는 꿈을 꿨어요.',
      '이빨이 우수수 빠지는 꿈을 꿨습니다.',
      '커다란 용이 하늘로 승천하는 걸 봤어요.',
      '맑은 강물에서 헤엄을 쳤어요.',
      '돌아가신 할머니가 환하게 웃으셨어요.',
    ];

    function App() {
      const [dream, setDream] = useState('');
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');
      const resultRef = useRef(null);

      async function divine() {
        const text = dream.trim();
        if (!text) { setError('간밤에 꾼 꿈 이야기를 들려주시게.'); return; }
        setLoading(true); setError(''); setResult(null);
        try {
          const res = await fetch('/api/haemong', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dream: text }),
          });
          const data = await res.json();
          if (!res.ok) { setError(data.error || '해몽에 실패하였느니라.'); }
          else {
            setResult(data);
            setTimeout(() => resultRef.current &&
              resultRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' }), 60);
          }
        } catch (_e) {
          setError('해몽소와의 연이 끊겼느니라. 잠시 후 다시 청해보시게.');
        } finally {
          setLoading(false);
        }
      }

      function onKey(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') divine();
      }

      const theme = result ? themeOf(result.verdict) : null;

      return (
        <div className="max-w-2xl mx-auto px-5 py-10">
          {/* 머리말 */}
          <header className="text-center mb-8 rise">
            <div className="inline-flex items-center gap-2 mb-3">
              <span className="lantern text-4xl">🏮</span>
              <span className="text-5xl">🔮</span>
              <span className="lantern text-4xl">🏮</span>
            </div>
            <h1 className="text-3xl sm:text-4xl font-bold tracking-tight" style={{ color: '#5a2a14' }}>
              조선 해몽소 (解夢所)
            </h1>
            <p className="mt-2 text-sm sm:text-base" style={{ color: '#6b4a28' }}>
              간밤의 꿈을 들려주시게. 도사 어른이 길흉을 가려 오늘의 조언을 내려주시느니라.
            </p>
          </header>

          {/* 입력 */}
          <section className="paper rounded-2xl p-5 sm:p-6 rise">
            <label className="block text-sm font-semibold mb-2" style={{ color: '#5a3a1c' }}>
              ✍️ 간밤에 꾼 꿈
            </label>
            <textarea
              value={dream}
              onChange={(e) => setDream(e.target.value)}
              onKeyDown={onKey}
              rows={4}
              maxLength={2000}
              placeholder="예) 돼지가 품에 안기는 꿈을 꿨어요…  (Ctrl+Enter 로 풀이)"
              className="w-full resize-none rounded-xl px-4 py-3 bg-white/70 border border-amber-900/20
                         outline-none focus:ring-2 focus:ring-rose-700/40 text-[15px] leading-relaxed"
            />

            {/* 예시 꿈 */}
            <div className="mt-3 flex flex-wrap gap-2">
              {SAMPLES.map((s, i) => (
                <button key={i} onClick={() => setDream(s)}
                  className="text-xs px-3 py-1.5 rounded-full bg-amber-900/10 hover:bg-amber-900/20
                             border border-amber-900/15 transition" style={{ color: '#6b4a28' }}>
                  {s.length > 16 ? s.slice(0, 16) + '…' : s}
                </button>
              ))}
            </div>

            <button
              onClick={divine}
              disabled={loading}
              className="mt-4 w-full py-3 rounded-xl text-white font-bold text-lg tracking-wide
                         bg-gradient-to-r from-rose-700 to-amber-700 hover:from-rose-800 hover:to-amber-800
                         disabled:opacity-60 disabled:cursor-not-allowed transition shadow-lg">
              {loading
                ? <span className="inline-flex items-center gap-2">
                    <span className="spin inline-block w-5 h-5 border-2 border-white/40 border-t-white rounded-full"></span>
                    천기를 읽는 중…
                  </span>
                : '🔮 해몽을 청하옵니다'}
            </button>

            {error && (
              <p className="mt-3 text-sm text-rose-800 bg-rose-100/70 border border-rose-300 rounded-lg px-3 py-2">
                ⚠️ {error}
              </p>
            )}
          </section>

          {/* 결과 — 참조 카드(MTG) 디자인의 해몽 카드 */}
          {result && theme && (
            <section ref={resultRef} className="mt-8 rise">
              <div className="mx-auto" style={{ maxWidth: 384 }}>
                <div className="mtg-outer">
                  <div className="mtg-frame" style={{ '--frame': theme.frame, '--plate': theme.plate, '--art': theme.art }}>

                    {/* 타이틀 바: 점괘 제목 + 우측 판정 印 */}
                    <div className="mtg-plate flex items-center gap-2 px-3 py-1.5 mb-2">
                      <span className="text-base flex-1 font-bold leading-tight truncate"
                            style={{ color: '#2b1d12' }} title={result.omen}>
                        {result.omen || '꿈 풀이'}
                      </span>
                      <span className="shrink-0 w-7 h-7 rounded-full grid place-items-center text-base"
                            style={{ background: 'radial-gradient(circle at 35% 30%, #fff, rgba(255,255,255,.2)), ' + theme.frame,
                                     boxShadow: 'inset 0 0 0 1px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.4)' }}>
                        {theme.emoji}
                      </span>
                    </div>

                    {/* 일러스트 창 */}
                    <div className="mtg-art grid place-items-center">
                      <span className="sparkle twinkle text-lg" style={{ top: '16%', left: '18%' }}>✦</span>
                      <span className="sparkle twinkle text-sm" style={{ top: '30%', right: '20%', animationDelay: '.6s' }}>✦</span>
                      <span className="sparkle twinkle text-base" style={{ bottom: '20%', left: '26%', animationDelay: '1.1s' }}>✧</span>
                      <span className="sparkle twinkle text-xs" style={{ bottom: '30%', right: '26%', animationDelay: '.3s' }}>✦</span>
                      <span className="text-7xl" style={{ filter: 'drop-shadow(0 6px 14px rgba(0,0,0,.45))' }}>{theme.emoji}</span>
                      <span className="absolute bottom-2 right-2.5 text-[11px] tracking-wider px-2 py-0.5 rounded-full"
                            style={{ color: '#fff', background: 'rgba(0,0,0,.32)' }}>解夢圖</span>
                    </div>

                    {/* 타입 라인: 꿈 해몽 — 판정 */}
                    <div className="mtg-plate flex items-center gap-2 px-3 py-1 mt-2">
                      <span className="text-sm font-bold" style={{ color: '#2b1d12' }}>
                        몽점(夢占) — {result.verdict}
                      </span>
                      <span className="ml-auto seal px-1.5 py-0.5 rounded text-[11px] font-bold">{theme.tag}</span>
                      <span className="text-base">🔮</span>
                    </div>

                    {/* 텍스트 박스: 해몽(규칙) + 조언(플레이버) */}
                    <div className="mtg-textbox px-3.5 py-3 mt-2 pb-7">
                      <p className="leading-7 text-[13.5px] whitespace-pre-line" style={{ color: '#2b1d12' }}>
                        {result.interpretation}
                      </p>
                      {result.luck && (
                        <p className="mt-2 text-[12.5px]" style={{ color: '#6b4a28' }}>
                          🍀 <span className="font-semibold">행운</span> — {result.luck}
                        </p>
                      )}
                      <div className="my-2.5 h-px" style={{ background: 'rgba(90,60,30,.3)' }} />
                      <p className="italic leading-6 text-[13px]" style={{ color: '#5a3a1c' }}>
                        “{result.advice}”
                      </p>

                      {/* 능력치 박스 = 행운지수 */}
                      <div className="mtg-pt px-3 py-1 flex items-baseline gap-1">
                        <span className="text-lg font-extrabold tabular-nums" style={{ color: scoreColor(result.luckScore) }}>
                          {result.luckScore}
                        </span>
                        <span className="text-[10px] font-bold" style={{ color: '#5a3a1c' }}>運</span>
                      </div>
                    </div>

                  </div>
                </div>

                {/* 행운지수 게이지 */}
                <LuckGauge score={result.luckScore} />

                <button
                  onClick={() => { setResult(null); setDream(''); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                  className="mt-5 w-full py-2.5 rounded-xl font-semibold border border-amber-900/25
                             bg-white/50 hover:bg-white/80 transition" style={{ color: '#5a3a1c' }}>
                  ↻ 다른 꿈 풀이하기
                </button>
              </div>
            </section>
          )}

          <footer className="text-center mt-10 text-xs" style={{ color: '#7a5c38' }}>
            ※ 본 해몽은 전통 속설을 빌린 재미를 위한 것이니라. 마음의 길잡이로만 삼으시게. · Gemini AI
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
