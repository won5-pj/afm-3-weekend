<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Midjourney — 3D 토이스토리 스타일 AI 이미지 생성</title>

  <!-- ⚠️ 모든 CDN 버전 고정. @babel/standalone 은 반드시 7.x (8.x 는 인라인 변환 깨짐) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <style>
    /* Tailwind 으로 표현하기 어려운 부분만 커스텀 */
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    .skeleton-shimmer {
      background: linear-gradient(90deg, #1e1b2e 25%, #2d2740 50%, #1e1b2e 75%);
      background-size: 1000px 100%;
      animation: shimmer 1.6s infinite linear;
    }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .floaty { animation: floaty 4s ease-in-out infinite; }
    /* 부드러운 스크롤바 */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #14101f; }
    ::-webkit-scrollbar-thumb { background: #3a3155; border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: #4d4170; }
  </style>
</head>
<body class="bg-[#0d0a16] text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useCallback } = React;

    // 항상 자동으로 덧붙는 스타일 접미사 (앱의 시그니처 컨셉)
    const STYLE_SUFFIX = "3D Toy Story style, Pixar-style glossy render, soft studio lighting, plastic/clay texture";
    const STYLE_LABEL = "3D 토이스토리 스타일";

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // Button — variant / size 지원하는 기본 버튼
    function Button({ variant = "primary", size = "md", disabled, onClick, className = "", children, type = "button" }) {
      const base = "inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#0d0a16] disabled:opacity-50 disabled:cursor-not-allowed select-none";
      const variants = {
        primary: "bg-gradient-to-r from-fuchsia-500 to-indigo-500 hover:from-fuchsia-400 hover:to-indigo-400 text-white shadow-lg shadow-fuchsia-500/25 hover:shadow-fuchsia-500/40 focus:ring-fuchsia-400",
        secondary: "bg-white/5 hover:bg-white/10 text-slate-100 border border-white/10 focus:ring-white/30",
        ghost: "bg-transparent hover:bg-white/5 text-slate-300 focus:ring-white/20",
        danger: "bg-rose-500/90 hover:bg-rose-500 text-white focus:ring-rose-400",
      };
      const sizes = {
        sm: "text-xs px-3 py-1.5",
        md: "text-sm px-4 py-2.5",
        lg: "text-base px-6 py-3.5",
      };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    // Badge — 작은 라벨
    function Badge({ children, className = "" }) {
      return (
        <span className={`inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full ${className}`}>
          {children}
        </span>
      );
    }

    // Card — 기본 카드 래퍼
    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white/[0.03] border border-white/10 rounded-2xl backdrop-blur-sm ${className}`}>
          {children}
        </div>
      );
    }

    // SegmentedControl — 옵션 토글 그룹 (가로 선택)
    function SegmentedControl({ options, value, onChange, className = "" }) {
      return (
        <div className={`inline-flex p-1 bg-black/30 rounded-xl border border-white/10 ${className}`}>
          {options.map((opt) => (
            <button key={opt.value} onClick={() => onChange(opt.value)}
              className={`px-3.5 py-1.5 text-xs font-semibold rounded-lg transition-all duration-200 ${
                value === opt.value
                  ? "bg-gradient-to-r from-fuchsia-500 to-indigo-500 text-white shadow"
                  : "text-slate-400 hover:text-slate-200"
              }`}>
              {opt.label}
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 🧩 공통 / 레이아웃 컴포넌트
    // ========================================

    // Header — 브랜딩 + 컨셉 태그라인
    function Header() {
      return (
        <header className="relative overflow-hidden border-b border-white/10">
          {/* 배경 그라데이션 글로우 */}
          <div className="absolute -top-24 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-gradient-to-br from-fuchsia-600/30 via-indigo-600/20 to-cyan-500/10 blur-3xl rounded-full pointer-events-none"></div>
          <div className="relative max-w-6xl mx-auto px-5 py-8 sm:py-10">
            <div className="flex items-center gap-3">
              <div className="floaty w-11 h-11 sm:w-12 sm:h-12 rounded-2xl bg-gradient-to-br from-fuchsia-500 to-indigo-500 flex items-center justify-center text-2xl shadow-lg shadow-fuchsia-500/30">
                🛟
              </div>
              <div>
                <h1 className="text-2xl sm:text-3xl font-black tracking-tight bg-gradient-to-r from-fuchsia-300 via-white to-indigo-300 bg-clip-text text-transparent">
                  My Midjourney
                </h1>
                <p className="text-xs text-slate-400 -mt-0.5">AI 이미지 생성 · 토이스토리 에디션</p>
              </div>
            </div>
            <p className="mt-4 text-sm sm:text-base text-slate-300 max-w-2xl leading-relaxed">
              어떤 프롬프트를 입력해도 <span className="font-bold text-fuchsia-300">토이스토리 같은 3D 질감</span>으로!
              <br className="hidden sm:block" />
              픽사 스타일의 반짝이는 3D 렌더, 말랑한 플라스틱/점토 텍스처가 <span className="text-indigo-300 font-semibold">자동으로</span> 적용됩니다.
            </p>
          </div>
        </header>
      );
    }

    // Footer
    function Footer() {
      return (
        <footer className="border-t border-white/10 mt-16">
          <div className="max-w-6xl mx-auto px-5 py-6 text-center text-xs text-slate-500">
            🛟 My Midjourney — 학습용 데모 (이미지는 placeholder 입니다) · 모든 결과물엔 항상 {STYLE_LABEL}이 적용됩니다.
          </div>
        </footer>
      );
    }

    // ========================================
    // 🧩 기능 컴포넌트
    // ========================================

    // PromptComposer — 프롬프트 입력 + 옵션 + 생성 버튼
    function PromptComposer({ onGenerate, isGenerating, options, setOptions }) {
      const [prompt, setPrompt] = useState("");
      const textareaRef = useRef(null);

      const aspectOptions = [
        { value: "1:1", label: "1:1" },
        { value: "16:9", label: "16:9" },
        { value: "9:16", label: "9:16" },
      ];
      const countOptions = [
        { value: 1, label: "1장" },
        { value: 2, label: "2장" },
        { value: 4, label: "4장" },
      ];

      const handleSubmit = () => {
        const trimmed = prompt.trim();
        if (!trimmed || isGenerating) return;
        onGenerate(trimmed);
      };

      // Cmd/Ctrl + Enter 로 생성
      const handleKeyDown = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          handleSubmit();
        }
      };

      return (
        <Card className="p-4 sm:p-5 shadow-xl shadow-black/30">
          {/* 자동 스타일 안내 배지 */}
          <div className="flex flex-wrap items-center gap-2 mb-3">
            <Badge className="bg-gradient-to-r from-fuchsia-500/20 to-indigo-500/20 text-fuchsia-200 border border-fuchsia-400/30">
              <span>✨</span> 항상 적용: {STYLE_LABEL}
            </Badge>
            <Badge className="bg-white/5 text-slate-400 border border-white/10">
              <span>🔒</span> 스타일 고정 모드
            </Badge>
          </div>

          {/* 프롬프트 입력 */}
          <label htmlFor="prompt" className="sr-only">프롬프트 입력</label>
          <textarea
            id="prompt"
            ref={textareaRef}
            value={prompt}
            onChange={(e) => setPrompt(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder="무엇을 그릴까요?  예) 우주를 여행하는 고양이 우주비행사, 도시 야경, 커피를 든 로봇..."
            rows={3}
            className="w-full resize-none bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-sm sm:text-base text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-fuchsia-400/60 focus:border-transparent transition"
          />

          {/* 입력 미리보기: 자동 접미사 표시 */}
          {prompt.trim() && (
            <p className="mt-2 text-xs text-slate-400">
              실제 생성 프롬프트:
              <span className="text-slate-300"> "{prompt.trim()}"</span>
              <span className="text-fuchsia-300 font-medium"> + {STYLE_LABEL}</span>
            </p>
          )}

          {/* 옵션 컨트롤 */}
          <div className="mt-4 flex flex-wrap items-center gap-x-6 gap-y-4">
            <div>
              <p className="text-[11px] uppercase tracking-wide text-slate-500 mb-1.5">비율</p>
              <SegmentedControl options={aspectOptions} value={options.aspect}
                onChange={(v) => setOptions((o) => ({ ...o, aspect: v }))} />
            </div>
            <div>
              <p className="text-[11px] uppercase tracking-wide text-slate-500 mb-1.5">장수</p>
              <SegmentedControl options={countOptions} value={options.count}
                onChange={(v) => setOptions((o) => ({ ...o, count: v }))} />
            </div>
            <div className="flex-1 min-w-[180px]">
              <div className="flex items-center justify-between mb-1.5">
                <p className="text-[11px] uppercase tracking-wide text-slate-500">스타일 강도 (stylize)</p>
                <span className="text-xs font-semibold text-fuchsia-300">{options.stylize}</span>
              </div>
              <input
                type="range" min="0" max="100" step="5"
                value={options.stylize}
                onChange={(e) => setOptions((o) => ({ ...o, stylize: Number(e.target.value) }))}
                className="w-full accent-fuchsia-500 cursor-pointer"
                aria-label="스타일 강도"
              />
            </div>
          </div>

          {/* 생성 버튼 */}
          <div className="mt-5 flex items-center justify-between gap-3">
            <p className="text-xs text-slate-500 hidden sm:block">
              💡 <kbd className="px-1.5 py-0.5 bg-white/10 rounded text-[10px]">Ctrl/⌘ + Enter</kbd> 로도 생성
            </p>
            <Button size="lg" onClick={handleSubmit} disabled={!prompt.trim() || isGenerating}
              className="w-full sm:w-auto">
              {isGenerating ? (
                <>
                  <Spinner /> 생성 중...
                </>
              ) : (
                <>🎨 이미지 생성하기</>
              )}
            </Button>
          </div>
        </Card>
      );
    }

    // Spinner — 로딩 스피너
    function Spinner() {
      return (
        <svg className="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24" fill="none">
          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
          <path className="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
        </svg>
      );
    }

    // 비율 → Tailwind aspect 클래스 매핑
    const ASPECT_CLASS = { "1:1": "aspect-square", "16:9": "aspect-video", "9:16": "aspect-[9/16]" };
    // 비율 → picsum 사이즈
    const ASPECT_SIZE = { "1:1": [600, 600], "16:9": [800, 450], "9:16": [450, 800] };

    // SkeletonCard — 생성 중 스켈레톤
    function SkeletonCard({ aspect }) {
      return (
        <div className={`relative rounded-2xl overflow-hidden border border-white/10 ${ASPECT_CLASS[aspect]}`}>
          <div className="absolute inset-0 skeleton-shimmer"></div>
          <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 text-slate-400">
            <div className="text-3xl floaty">🧊</div>
            <p className="text-xs font-medium">3D 렌더링 중...</p>
          </div>
        </div>
      );
    }

    // ImageCard — 생성된 이미지 한 장
    function ImageCard({ image }) {
      const [loaded, setLoaded] = useState(false);
      return (
        <div className={`group relative rounded-2xl overflow-hidden border border-white/10 bg-black/40 ${ASPECT_CLASS[image.aspect]} shadow-lg`}>
          {!loaded && <div className="absolute inset-0 skeleton-shimmer"></div>}
          <img
            src={image.url}
            alt={image.prompt}
            loading="lazy"
            onLoad={() => setLoaded(true)}
            className={`w-full h-full object-cover transition-all duration-500 group-hover:scale-105 ${loaded ? "opacity-100" : "opacity-0"}`}
          />
          {/* 호버 오버레이 + 캡션 */}
          <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          <div className="absolute bottom-0 left-0 right-0 p-3 translate-y-2 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-300">
            <p className="text-xs text-white font-medium line-clamp-2">{image.prompt}</p>
            <p className="text-[10px] text-fuchsia-300 mt-1">+ {STYLE_LABEL}</p>
          </div>
          {/* 항상 보이는 스타일 배지 */}
          <div className="absolute top-2 left-2">
            <Badge className="bg-black/60 backdrop-blur text-fuchsia-200 border border-fuchsia-400/30">✨ 3D</Badge>
          </div>
        </div>
      );
    }

    // ResultsGrid — 결과 갤러리 영역
    function ResultsGrid({ isGenerating, currentBatch, pendingOptions }) {
      // 생성 중일 때 스켈레톤 개수 = 요청 장수
      if (isGenerating) {
        return (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-4">
            {Array.from({ length: pendingOptions.count }).map((_, i) => (
              <SkeletonCard key={i} aspect={pendingOptions.aspect} />
            ))}
          </div>
        );
      }

      // 아직 생성 안 했을 때: 빈 상태
      if (!currentBatch) {
        return (
          <Card className="p-10 sm:p-16 text-center">
            <div className="text-5xl mb-4 floaty">🎁</div>
            <h3 className="text-lg font-bold text-slate-200">아직 생성된 이미지가 없어요</h3>
            <p className="mt-2 text-sm text-slate-400 max-w-md mx-auto">
              위에 프롬프트를 입력하고 <span className="text-fuchsia-300 font-semibold">이미지 생성하기</span>를 눌러보세요.
              무엇을 입력하든 토이스토리 같은 말랑한 3D 질감으로 만들어 드립니다!
            </p>
          </Card>
        );
      }

      // 생성 결과
      return (
        <div>
          <div className="flex items-center gap-2 mb-3">
            <h3 className="text-sm font-semibold text-slate-300">생성 결과</h3>
            <Badge className="bg-white/5 text-slate-400 border border-white/10">"{currentBatch.prompt}"</Badge>
          </div>
          <div className={`grid gap-4 ${currentBatch.images.length === 1 ? "grid-cols-1 max-w-md" : "grid-cols-1 sm:grid-cols-2"}`}>
            {currentBatch.images.map((img) => (
              <ImageCard key={img.id} image={img} />
            ))}
          </div>
        </div>
      );
    }

    // HistoryPanel — 최근 생성 기록
    function HistoryPanel({ history, onSelect, onClear }) {
      if (history.length === 0) {
        return (
          <Card className="p-5">
            <h3 className="text-sm font-semibold text-slate-300 mb-1">최근 생성 기록</h3>
            <p className="text-xs text-slate-500">아직 기록이 없습니다.</p>
          </Card>
        );
      }
      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-slate-300">최근 생성 기록</h3>
            <Button variant="ghost" size="sm" onClick={onClear}>전체 삭제</Button>
          </div>
          <ul className="space-y-2">
            {history.map((batch) => (
              <li key={batch.id}>
                <button onClick={() => onSelect(batch)}
                  className="w-full flex items-center gap-3 p-2 rounded-xl hover:bg-white/5 transition text-left group">
                  {/* 썸네일 */}
                  <img src={batch.images[0].url} alt="" loading="lazy"
                    className="w-12 h-12 rounded-lg object-cover border border-white/10 flex-shrink-0" />
                  <div className="min-w-0 flex-1">
                    <p className="text-xs text-slate-200 truncate group-hover:text-white">{batch.prompt}</p>
                    <p className="text-[10px] text-slate-500">{batch.aspect} · {batch.images.length}장 · {batch.time}</p>
                  </div>
                  <span className="text-slate-500 group-hover:text-fuchsia-300 transition">↗</span>
                </button>
              </li>
            ))}
          </ul>
        </Card>
      );
    }

    // ========================================
    // 🚀 App — 루트 컴포넌트
    // ========================================
    function App() {
      const [options, setOptions] = useState({ aspect: "1:1", count: 4, stylize: 70 });
      const [isGenerating, setIsGenerating] = useState(false);
      const [pendingOptions, setPendingOptions] = useState(options); // 생성 중 스켈레톤용
      const [currentBatch, setCurrentBatch] = useState(null);
      const [history, setHistory] = useState([]);
      const timerRef = useRef(null);

      // placeholder 이미지 URL 생성 (picsum, 시드로 일관된 이미지)
      const makeImageUrl = (seed, aspect) => {
        const [w, h] = ASPECT_SIZE[aspect];
        return `https://picsum.photos/seed/${seed}/${w}/${h}`;
      };

      const handleGenerate = useCallback((prompt) => {
        // 현재 옵션 스냅샷 저장 (생성 중 스켈레톤 개수/비율 고정)
        const snap = { ...options };
        setPendingOptions(snap);
        setIsGenerating(true);
        setCurrentBatch(null);

        // 실제 백엔드가 없으므로 ~1.5초 후 placeholder 채우기
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
          const baseSeed = Date.now();
          const images = Array.from({ length: snap.count }).map((_, i) => ({
            id: `${baseSeed}-${i}`,
            url: makeImageUrl(`${baseSeed}-${i}`, snap.aspect),
            prompt,
            aspect: snap.aspect,
          }));
          const now = new Date();
          const batch = {
            id: baseSeed,
            prompt,
            aspect: snap.aspect,
            stylize: snap.stylize,
            images,
            time: now.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" }),
          };
          setCurrentBatch(batch);
          setHistory((h) => [batch, ...h].slice(0, 8)); // 최근 8개 유지
          setIsGenerating(false);
        }, 1500);
      }, [options]);

      // 언마운트 시 타이머 정리
      useEffect(() => () => clearTimeout(timerRef.current), []);

      return (
        <div className="min-h-screen flex flex-col">
          <Header />

          <main className="flex-1 w-full max-w-6xl mx-auto px-5 py-6 sm:py-8">
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              {/* 좌측: 입력 + 결과 */}
              <div className="lg:col-span-2 space-y-6">
                <PromptComposer
                  onGenerate={handleGenerate}
                  isGenerating={isGenerating}
                  options={options}
                  setOptions={setOptions}
                />
                <ResultsGrid
                  isGenerating={isGenerating}
                  currentBatch={currentBatch}
                  pendingOptions={pendingOptions}
                />
              </div>

              {/* 우측: 기록 + 안내 */}
              <aside className="space-y-6">
                <HistoryPanel
                  history={history}
                  onSelect={(batch) => setCurrentBatch(batch)}
                  onClear={() => setHistory([])}
                />
                {/* 컨셉 설명 카드 */}
                <Card className="p-5">
                  <h3 className="text-sm font-semibold text-slate-300 mb-2 flex items-center gap-2">
                    <span>💡</span> 이 앱의 특별한 점
                  </h3>
                  <ul className="space-y-2 text-xs text-slate-400 leading-relaxed">
                    <li className="flex gap-2"><span className="text-fuchsia-400">▹</span> 어떤 프롬프트든 <b className="text-slate-200">토이스토리 3D 질감</b>으로 변환</li>
