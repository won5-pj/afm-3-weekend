<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모장</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ 모든 CDN 버전 고정. @babel/standalone 미고정 시 8.x 로 올라가 text/babel 인라인 변환이 깨진다. Babel 은 반드시 7.x. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    /* 커스텀 스크롤바 (Tailwind 로 표현 어려운 부분만) */
    .scroll-thin::-webkit-scrollbar { width: 8px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .scroll-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ========================================
    // 📡 API 설정 & 헬퍼
    // ========================================
    const API_BASE_URL = '/api';

    async function apiRequest(path, options = {}) {
      const res = await fetch(`${API_BASE_URL}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (!res.ok) {
        throw new Error(`요청 실패 (HTTP ${res.status})`);
      }
      return res.json();
    }

    const memoApi = {
      list: () => apiRequest('/memos'),
      create: (data) => apiRequest('/memos', { method: 'POST', body: JSON.stringify(data) }),
      update: (id, data) => apiRequest(`/memos/${id}`, { method: 'PATCH', body: JSON.stringify(data) }),
      remove: (id) => apiRequest(`/memos/${id}`, { method: 'DELETE' }),
    };

    // 날짜 포맷 (한국어 상대/절대 표시)
    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const now = new Date();
      const diff = (now - d) / 1000; // 초
      if (diff < 60) return '방금 전';
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400 && d.getDate() === now.getDate()) {
        return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      }
      return d.toLocaleDateString('ko-KR', { year: '2-digit', month: '2-digit', day: '2-digit' });
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트
    // ========================================
    function Button({ variant = 'primary', size = 'md', className = '', children, ...props }) {
      const base = 'inline-flex items-center justify-center gap-1.5 font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-400',
        secondary: 'bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 focus:ring-slate-300',
        danger: 'bg-red-50 text-red-600 hover:bg-red-100 focus:ring-red-300',
        ghost: 'text-slate-500 hover:bg-slate-100 hover:text-slate-700 focus:ring-slate-300',
      };
      const sizes = {
        sm: 'text-xs px-2.5 py-1.5',
        md: 'text-sm px-3.5 py-2',
        lg: 'text-base px-5 py-2.5',
      };
      return (
        <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {children}
        </button>
      );
    }

    function Spinner({ className = '' }) {
      return (
        <svg className={`animate-spin ${className}`} viewBox="0 0 24 24" fill="none">
          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z" />
        </svg>
      );
    }

    function Modal({ isOpen, onClose, title, children, footer }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
            <div className="px-6 pt-5 pb-2">
              <h3 className="text-lg font-semibold text-slate-800">{title}</h3>
            </div>
            <div className="px-6 py-3 text-sm text-slate-600">{children}</div>
            <div className="px-6 py-4 flex justify-end gap-2">{footer}</div>
          </div>
        </div>
      );
    }

    // 저장 상태 배지
    function SaveStatus({ status }) {
      const map = {
        saved: { text: '저장됨', cls: 'text-emerald-600', dot: 'bg-emerald-500' },
        saving: { text: '저장 중…', cls: 'text-amber-600', dot: 'bg-amber-500 animate-pulse' },
        error: { text: '저장 실패', cls: 'text-red-600', dot: 'bg-red-500' },
        idle: { text: '', cls: '', dot: '' },
      };
      const s = map[status] || map.idle;
      if (!s.text) return null;
      return (
        <span className={`inline-flex items-center gap-1.5 text-xs font-medium ${s.cls}`}>
          <span className={`w-2 h-2 rounded-full ${s.dot}`} />
          {s.text}
        </span>
      );
    }

    // ========================================
    // 🧩 메모 목록 아이템
    // ========================================
    function MemoListItem({ memo, active, onSelect, onDelete }) {
      const title = memo.title?.trim() || '(제목 없음)';
      const preview = memo.content?.trim().replace(/\n/g, ' ') || '추가 텍스트 없음';
      return (
        <li
          onClick={() => onSelect(memo.id)}
          className={`group relative cursor-pointer rounded-xl px-4 py-3 transition-colors border ${
            active
              ? 'bg-indigo-50 border-indigo-200'
              : 'bg-white border-transparent hover:bg-slate-50'
          }`}
        >
          <div className="flex items-start justify-between gap-2">
            <h3 className={`font-semibold text-sm truncate ${active ? 'text-indigo-700' : 'text-slate-800'}`}>
              {title}
            </h3>
            <button
              onClick={(e) => { e.stopPropagation(); onDelete(memo); }}
              className="shrink-0 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 focus:opacity-100 transition-opacity"
              aria-label="메모 삭제"
              title="삭제"
            >
              <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.9 12.1A2 2 0 0116.1 21H7.9a2 2 0 01-2-1.9L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3M4 7h16" />
              </svg>
            </button>
          </div>
          <p className="mt-1 text-xs text-slate-500 line-clamp-2">{preview}</p>
          <p className="mt-1.5 text-[11px] text-slate-400">{formatDate(memo.updatedAt)}</p>
        </li>
      );
    }

    // ========================================
    // 📄 편집기
    // ========================================
    function MemoEditor({ memo, onChange, saveStatus, onBack }) {
      if (!memo) {
        return (
          <div className="flex-1 flex flex-col items-center justify-center text-center p-8 text-slate-400">
            <svg className="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.4-9.6a2 2 0 112.8 2.8L11.8 15.8 8 17l1.2-3.8 9.4-9.4z" />
            </svg>
            <p className="text-sm">메모를 선택하거나 새 메모를 만들어보세요.</p>
          </div>
        );
      }
      return (
        <div className="flex-1 flex flex-col h-full bg-white">
          <div className="flex items-center justify-between gap-2 px-4 md:px-6 py-3 border-b border-slate-100">
            <button onClick={onBack} className="md:hidden text-slate-500 hover:text-slate-700" aria-label="목록으로">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
              </svg>
            </button>
            <div className="flex-1 text-right">
              <SaveStatus status={saveStatus} />
            </div>
          </div>
          <div className="flex-1 flex flex-col p-4 md:p-6 overflow-y-auto scroll-thin">
            <input
              type="text"
              value={memo.title}
              onChange={(e) => onChange({ title: e.target.value })}
              placeholder="제목"
              className="w-full text-2xl font-bold text-slate-800 placeholder-slate-300 focus:outline-none mb-1"
              aria-label="제목"
            />
            <p className="text-xs text-slate-400 mb-4">
              {formatDate(memo.updatedAt) && `마지막 수정: ${formatDate(memo.updatedAt)}`}
            </p>
            <textarea
              value={memo.content}
              onChange={(e) => onChange({ content: e.target.value })}
              placeholder="내용을 입력하세요…"
              className="flex-1 w-full resize-none text-slate-700 leading-relaxed placeholder-slate-300 focus:outline-none min-h-[300px]"
              aria-label="내용"
            />
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [memos, setMemos] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [creating, setCreating] = useState(false);
      const [saveStatus, setSaveStatus] = useState('idle'); // idle | saving | saved | error
      const [deleteTarget, setDeleteTarget] = useState(null);
      const [mobileView, setMobileView] = useState('list'); // list | editor (모바일 전용)

      const debounceRef = useRef(null);

      const selectedMemo = useMemo(
        () => memos.find((m) => m.id === selectedId) || null,
        [memos, selectedId]
      );

      // 최초 로드
      useEffect(() => {
        let alive = true;
        (async () => {
          try {
            setLoading(true);
            const data = await memoApi.list();
            if (alive) setMemos(data);
          } catch (e) {
            if (alive) setError('메모를 불러오지 못했습니다. 서버를 확인해주세요.');
          } finally {
            if (alive) setLoading(false);
          }
        })();
        return () => { alive = false; };
      }, []);

      // 디바운스 자동저장
      const scheduleSave = useCallback((id, patch) => {
        setSaveStatus('saving');
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(async () => {
          try {
            const updated = await memoApi.update(id, patch);
            setMemos((prev) => {
              const others = prev.filter((m) => m.id !== updated.id);
              return [updated, ...others]; // 최근 수정순 정렬 유지
            });
            setSaveStatus('saved');
          } catch (e) {
            setSaveStatus('error');
          }
        }, 600);
      }, []);

      // 편집 핸들러 (로컬 즉시 반영 + 디바운스 저장)
      const handleEditChange = useCallback((patch) => {
        if (!selectedId) return;
        setMemos((prev) =>
          prev.map((m) => (m.id === selectedId ? { ...m, ...patch } : m))
        );
        const current = memos.find((m) => m.id === selectedId);
        scheduleSave(selectedId, {
          title: patch.title !== undefined ? patch.title : current.title,
          content: patch.content !== undefined ? patch.content : current.content,
        });
      }, [selectedId, memos, scheduleSave]);

      // 새 메모
      const handleCreate = useCallback(async () => {
        try {
          setCreating(true);
          setError(null);
          const created = await memoApi.create({ title: '', content: '' });
          setMemos((prev) => [created, ...prev]);
          setSelectedId(created.id);
          setSaveStatus('idle');
          setMobileView('editor');
        } catch (e) {
          setError('새 메모를 만들지 못했습니다.');
        } finally {
          setCreating(false);
        }
      }, []);

      // 선택
      const handleSelect = useCallback((id) => {
        if (debounceRef.current) clearTimeout(debounceRef.current);
        setSelectedId(id);
        setSaveStatus('idle');
        setMobileView('editor');
      }, []);

      // 삭제 확정
      const confirmDelete = useCallback(async () => {
        const target = deleteTarget;
        if (!target) return;
        try {
          await memoApi.remove(target.id);
          setMemos((prev) => prev.filter((m) => m.id !== target.id));
          if (selectedId === target.id) {
            setSelectedId(null);
            setMobileView('list');
          }
        } catch (e) {
          setError('메모를 삭제하지 못했습니다.');
        } finally {
          setDeleteTarget(null);
        }
      }, [deleteTarget, selectedId]);

      return (
        <div className="h-screen flex flex-col">
          {/* 헤더 */}
          <header className="shrink-0 bg-white border-b border-slate-200 px-4 md:px-6 py-3 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-2xl">📝</span>
              <h1 className="text-lg font-bold text-slate-800">메모장</h1>
              {!loading && (
                <span className="text-xs text-slate-400 ml-1">{memos.length}개</span>
              )}
            </div>
            <Button onClick={handleCreate} disabled={creating} size="md">
              {creating ? <Spinner className="w-4 h-4" /> : (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 5v14M5 12h14" />
                </svg>
              )}
              새 메모
            </Button>
          </header>

          {/* 에러 배너 */}
          {error && (
            <div className="shrink-0 bg-red-50 border-b border-red-100 px-4 md:px-6 py-2 flex items-center justify-between">
              <p className="text-sm text-red-600">{error}</p>
              <button onClick={() => setError(null)} className="text-red-400 hover:text-red-600 text-sm" aria-label="닫기">✕</button>
            </div>
          )}

          {/* 본문 */}
          <div className="flex-1 flex overflow-hidden">
            {/* 목록 */}
            <aside className={`${mobileView === 'editor' ? 'hidden' : 'flex'} md:flex w-full md:w-80 lg:w-96 shrink-0 flex-col border-r border-slate-200 bg-slate-50`}>
              {loading ? (
                <div className="flex-1 flex items-center justify-center text-slate-400">
                  <Spinner className="w-6 h-6 mr-2 text-indigo-500" /> 불러오는 중…
                </div>
              ) : memos.length === 0 ? (
                <div className="flex-1 flex flex-col items-center justify-center text-center p-8 text-slate-400">
                  <svg className="w-14 h-14 mb-3 text-slate-300" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.6a1 1 0 01.7.3l5.4 5.4a1 1 0 01.3.7V19a2 2 0 01-2 2z" />
                  </svg>
                  <p className="text-sm">메모가 없습니다.</p>
                  <p className="text-xs mt-1">"새 메모" 버튼으로 시작하세요.</p>
                </div>
              ) : (
                <ul className="flex-1 overflow-y-auto scroll-thin p-2 space-y-1.5">
                  {memos.map((memo) => (
                    <MemoListItem
                      key={memo.id}
                      memo={memo}
                      active={memo.id === selectedId}
                      onSelect={handleSelect}
                      onDelete={setDeleteTarget}
                    />
                  ))}
                </ul>
              )}
            </aside>

            {/* 편집기 */}
            <main className={`${mobileView === 'list' ? 'hidden' : 'flex'} md:flex flex-1 flex-col overflow-hidden`}>
              <MemoEditor
                memo={selectedMemo}
                onChange={handleEditChange}
                saveStatus={saveStatus}
                onBack={() => { setMobileView('list'); }}
              />
            </main>
          </div>

          {/* 삭제 확인 모달 */}
          <Modal
            isOpen={!!deleteTarget}
            onClose={() => setDeleteTarget(null)}
            title="메모 삭제"
            footer={
              <>
                <Button variant="secondary" onClick={() => setDeleteTarget(null)}>취소</Button>
                <Button variant="danger" onClick={confirmDelete}>삭제</Button>
              </>
            }
          >
            "<span className="font-medium">{deleteTarget?.title?.trim() || '(제목 없음)'}</span>" 메모를 삭제할까요? 이 작업은 되돌릴 수 없습니다.
          </Modal>
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
