<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>클로드(Claude) — Anthropic의 AI 어시스턴트</title>

  <!-- ⚠️ 모든 CDN은 버전을 명시적으로 고정한다. 미고정 시 @babel/standalone 이
       최신(8.x)으로 올라가 type="text/babel" 인라인 변환이 통째로 깨진다.
       Babel 은 반드시 7.x 로 고정한다. React/ReactDOM 도 정확히 핀. -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <script>
    // Tailwind 커스텀 설정 — 브루탈리즘 하드 섀도우 & 원색 팔레트
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Courier New"', 'ui-monospace', 'monospace'],
          },
          colors: {
            brutal: {
              yellow: '#FFE100',
              red:    '#FF4B33',
              blue:   '#2E5BFF',
              green:  '#00E070',
              pink:   '#FF6FD8',
              cream:  '#FAF7EF',
            },
          },
          boxShadow: {
            'brutal':    '8px 8px 0 0 #000',
            'brutal-sm': '4px 4px 0 0 #000',
            'brutal-lg': '12px 12px 0 0 #000',
          },
        },
      },
    };
  </script>

  <style>
    /* Tailwind 로 표현하기 어려운 것만 CSS 사용: 마퀴 애니메이션, 스크롤 동작 */
    html { scroll-behavior: smooth; }
    body { background: #FAF7EF; }

    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .marquee-track {
      display: inline-flex;
      white-space: nowrap;
      animation: marquee 18s linear infinite;
    }
    .marquee-wrap:hover .marquee-track { animation-play-state: paused; }

    /* 브루탈리즘 눌림 인터랙션 — 그림자 사라지며 아래로 눌림 */
    .press {
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    .press:hover { transform: translate(4px, 4px); box-shadow: 0 0 0 0 #000 !important; }
    .press:active { transform: translate(6px, 6px); }

    /* 커서 깜빡임 (히어로 타이핑 느낌) */
    @keyframes blink { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }
    .cursor { animation: blink 1s step-end infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef } = React;

    // ========================================
    // 🎨 Design System Components (브루탈리즘 프리미티브)
    // ========================================

    // 하드 섀도우 + 두꺼운 검정 테두리를 가진 기본 블록
    function Box({ as: Tag = 'div', color = 'bg-white', shadow = 'shadow-brutal', className = '', children, ...rest }) {
      return (
        <Tag
          className={`border-4 border-black ${color} ${shadow} ${className}`}
          {...rest}
        >
          {children}
        </Tag>
      );
    }

    // 브루탈리즘 버튼 — 호버 시 눌림
    function Button({ color = 'bg-brutal-yellow', size = 'md', className = '', children, ...rest }) {
      const sizes = {
        sm: 'px-4 py-2 text-sm',
        md: 'px-6 py-3 text-base',
        lg: 'px-8 py-4 text-lg',
      };
      return (
        <button
          className={`press inline-flex items-center justify-center gap-2 font-mono font-black uppercase tracking-wide
                      border-4 border-black shadow-brutal-sm ${color} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    // 라벨 배지 (약간 기울어짐 옵션)
    function Badge({ color = 'bg-brutal-green', className = '', children }) {
      return (
        <span className={`inline-block border-4 border-black ${color} px-3 py-1 font-mono font-black uppercase text-sm shadow-brutal-sm ${className}`}>
          {children}
        </span>
      );
    }

    // 섹션 제목 (큼직한 대문자 + 색 블록 강조)
    function SectionTitle({ kicker, title, color = 'bg-brutal-blue', textColor = 'text-white' }) {
      return (
        <div className="mb-10">
          <Badge color={color} className={`${textColor} -rotate-2`}>{kicker}</Badge>
          <h2 className="mt-4 text-4xl sm:text-5xl md:text-6xl font-black uppercase leading-none tracking-tight">
            {title}
          </h2>
        </div>
      );
    }

    // ========================================
    // 🧩 Common / Layout Components
    // ========================================

    function Header() {
      const links = [
        { href: '#can-do', label: '할 수 있는 일' },
        { href: '#models', label: '모델' },
        { href: '#where',  label: '사용처' },
        { href: '#values', label: '지향점' },
      ];
      const [open, setOpen] = useState(false);

      return (
        <header className="sticky top-0 z-50 border-b-4 border-black bg-brutal-yellow">
          <div className="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
            <a href="#top" className="flex items-center gap-3">
              <span className="grid place-items-center h-10 w-10 border-4 border-black bg-black text-brutal-yellow font-black text-xl">C</span>
              <span className="font-mono font-black text-xl tracking-tight uppercase">Claude</span>
            </a>

            {/* 데스크톱 내비 */}
            <nav className="hidden md:flex items-center gap-2">
              {links.map(l => (
                <a key={l.href} href={l.href}
                   className="press border-4 border-black bg-white shadow-brutal-sm px-4 py-2 font-mono font-bold text-sm uppercase">
                  {l.label}
                </a>
              ))}
            </nav>

            {/* 모바일 토글 */}
            <button
              className="md:hidden press border-4 border-black bg-white shadow-brutal-sm px-4 py-2 font-mono font-black uppercase"
              onClick={() => setOpen(o => !o)}
              aria-expanded={open}
              aria-label="메뉴 열기">
              {open ? '✕' : '☰'}
            </button>
          </div>

          {open && (
            <nav className="md:hidden border-t-4 border-black bg-white px-4 py-3 flex flex-col gap-2">
              {links.map(l => (
                <a key={l.href} href={l.href} onClick={() => setOpen(false)}
                   className="border-4 border-black bg-brutal-cream px-4 py-3 font-mono font-bold uppercase">
                  {l.label}
                </a>
              ))}
            </nav>
          )}
        </header>
      );
    }

    // 무한 스크롤 마퀴 띠
    function Marquee({ items, color = 'bg-black', textColor = 'text-brutal-yellow' }) {
      const row = items.map((t, i) => (
        <span key={i} className="mx-6 font-mono font-black uppercase text-lg">★ {t}</span>
      ));
      return (
        <div className={`marquee-wrap overflow-hidden border-y-4 border-black ${color} ${textColor} py-3`}>
          <div className="marquee-track">
            {row}{row}
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Section Components
    // ========================================

    // --- 히어로 ---
    function Hero() {
      const phrases = ['정직하게.', '무해하게.', '도움이 되게.'];
      const [idx, setIdx] = useState(0);

      useEffect(() => {
        const t = setInterval(() => setIdx(i => (i + 1) % phrases.length), 1800);
        return () => clearInterval(t);
      }, []);

      return (
        <section id="top" className="relative overflow-hidden border-b-4 border-black bg-brutal-cream">
          {/* 배경 도형 블록들 (겹치고 삐뚤어진 브루탈리즘 요소) */}
          <div className="pointer-events-none absolute -top-10 -right-10 h-48 w-48 rotate-12 border-4 border-black bg-brutal-pink hidden sm:block"></div>
          <div className="pointer-events-none absolute bottom-8 left-6 h-24 w-24 -rotate-6 border-4 border-black bg-brutal-green hidden sm:block"></div>

          <div className="relative mx-auto max-w-6xl px-4 py-16 sm:py-24">
            <Badge color="bg-brutal-red" className="text-white rotate-2">Anthropic 이 만든 AI</Badge>

            <h1 className="mt-6 text-5xl sm:text-7xl md:text-8xl font-black uppercase leading-[0.9] tracking-tighter">
              안녕하세요,<br />
              저는{' '}
              <span className="inline-block bg-brutal-yellow border-4 border-black px-3 shadow-brutal -rotate-1">
                클로드
              </span>
              {' '}입니다
            </h1>

            <p className="mt-8 max-w-2xl text-lg sm:text-xl font-mono font-bold leading-relaxed">
              긴 문서와 코드를 이해하고, 복잡한 문제를 추론하고, 대화하고, 요약·번역·분석하고,
              직접 코딩까지 하는 <span className="bg-brutal-blue text-white px-1">AI 어시스턴트</span>예요.
            </p>

            {/* 타이핑 느낌 로테이션 */}
            <p className="mt-4 font-mono font-black text-2xl sm:text-3xl">
              저는 늘{' '}
              <span className="bg-black text-brutal-green px-2">{phrases[idx]}</span>
              <span className="cursor">_</span>
            </p>

            <div className="mt-10 flex flex-wrap gap-4">
              <Button as="a" color="bg-brutal-yellow" size="lg" onClick={() => { location.hash = '#can-do'; }}>
                ▶ 뭘 할 수 있냐면
              </Button>
              <Button color="bg-white" size="lg" onClick={() => { location.hash = '#where'; }}>
                어디서 쓰나요?
              </Button>
            </div>
          </div>
        </section>
      );
    }

    // --- 내가 할 수 있는 일 (카드 그리드) ---
    function CanDo() {
      const cards = [
        { emoji: '📚', color: 'bg-brutal-yellow', title: '긴 문서 이해', desc: '방대한 문서·리포트·코드베이스를 통째로 읽고 핵심을 뽑아내요.' },
        { emoji: '🧠', color: 'bg-brutal-pink',   title: '복잡한 추론',  desc: '여러 단계를 거쳐야 하는 어려운 문제도 차근차근 풀어냅니다.' },
        { emoji: '💬', color: 'bg-brutal-green',  title: '자연스러운 대화', desc: '맥락을 기억하며 사람처럼 자연스럽게 이야기를 이어가요.' },
        { emoji: '📝', color: 'bg-brutal-blue',   title: '요약·번역·분석', textColor: 'text-white', desc: '긴 글을 요약하고, 언어를 넘나들며 번역하고, 데이터를 분석해요.' },
        { emoji: '💻', color: 'bg-brutal-red',    title: '코딩 & 작성',  textColor: 'text-white', desc: '코드를 읽고 쓰고 고쳐요. 문서·이메일·기획서 작성도 척척.' },
        { emoji: '🤖', color: 'bg-white',         title: '에이전트형 작업', desc: '도구를 직접 쓰며 여러 단계의 작업을 알아서 수행합니다.' },
      ];

      return (
        <section id="can-do" className="border-b-4 border-black bg-white">
          <div className="mx-auto max-w-6xl px-4 py-16 sm:py-24">
            <SectionTitle kicker="WHAT I CAN DO" title="내가 할 수 있는 일" color="bg-brutal-red" />
            <div className="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
              {cards.map((c, i) => (
                <Box
                  key={i}
                  color={c.color}
                  className={`press shadow-brutal p-6 ${c.textColor || 'text-black'} ${i % 2 ? 'rotate-1' : '-rotate-1'} hover:rotate-0`}
                >
                  <div className="text-5xl mb-4">{c.emoji}</div>
                  <h3 className="font-mono font-black text-2xl uppercase leading-none">{c.title}</h3>
                  <p className="mt-3 font-mono font-bold leading-relaxed">{c.desc}</p>
                </Box>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // --- 모델 라인업 ---
    function Models() {
      const models = [
        {
          tag: 'FLAGSHIP',
          name: 'Opus 4.8',
          color: 'bg-brutal-yellow',
          desc: '가장 강력한 추론. 어렵고 복잡한 문제, 대규모 코딩·에이전트 작업에 강합니다.',
          traits: ['깊은 추론', '대형 작업', '고품질'],
        },
        {
          tag: 'FAST',
          name: 'Haiku 4.5',
          color: 'bg-brutal-green',
          desc: '가볍고 빠른 응답. 빠른 속도가 중요한 작업과 대량 처리에 잘 맞아요.',
          traits: ['빠름', '경량', '효율적'],
        },
        {
          tag: 'FAMILY',
          name: 'Claude 5 계열',
          color: 'bg-brutal-blue',
          textColor: 'text-white',
          desc: '최신 세대 모델 패밀리. 용도에 따라 강력함과 속도의 라인업을 골라 쓸 수 있습니다.',
          traits: ['라인업', '최신 세대', '선택지'],
        },
      ];

      return (
        <section id="models" className="border-b-4 border-black bg-brutal-cream">
          <div className="mx-auto max-w-6xl px-4 py-16 sm:py-24">
            <SectionTitle kicker="MODEL LINEUP" title="모델 라인업" color="bg-brutal-green" textColor="text-black" />
            <div className="grid gap-6 md:grid-cols-3">
              {models.map((m, i) => (
                <Box key={i} color="bg-white" className="press shadow-brutal-lg p-0 overflow-hidden flex flex-col">
                  <div className={`border-b-4 border-black ${m.color} ${m.textColor || 'text-black'} px-6 py-4 flex items-center justify-between`}>
                    <span className="font-mono font-black uppercase text-sm">{m.tag}</span>
                    <span className="font-mono font-black">0{i + 1}</span>
                  </div>
                  <div className="p-6 flex flex-col flex-1">
                    <h3 className="font-black text-3xl uppercase leading-none tracking-tight">{m.name}</h3>
                    <p className="mt-4 font-mono font-bold leading-relaxed flex-1">{m.desc}</p>
                    <div className="mt-5 flex flex-wrap gap-2">
                      {m.traits.map(t => (
                        <span key={t} className="border-2 border-black bg-brutal-cream px-2 py-1 font-mono text-xs font-bold uppercase">#{t}</span>
                      ))}
                    </div>
                  </div>
                </Box>
              ))}
            </div>
            <p className="mt-8 font-mono text-sm font-bold opacity-70">
              ※ 라인업은 강력한 추론의 Opus, 빠른 Haiku 처럼 용도에 맞춰 구성돼요.
            </p>
          </div>
        </section>
      );
    }

    // --- 어디서 쓸 수 있나 ---
    function Where() {
      const places = [
        { emoji: '⌨️', color: 'bg-black', textColor: 'text-brutal-green', title: 'Claude Code', desc: '터미널·IDE에서 쓰는 코딩 에이전트 CLI. 코드를 직접 읽고 고치고 실행해요.' },
        { emoji: '🔌', color: 'bg-brutal-blue', textColor: 'text-white', title: 'Claude API', desc: '여러분의 앱과 서비스에 클로드를 직접 연결해 통합할 수 있어요.' },
        { emoji: '🖥️', color: 'bg-brutal-yellow', title: '데스크톱 · 웹 앱', desc: '브라우저나 데스크톱 앱에서 바로 대화하며 사용할 수 있어요.' },
      ];
      return (
        <section id="where" className="border-b-4 border-black bg-brutal-blue">
          <div className="mx-auto max-w-6xl px-4 py-16 sm:py-24">
            <div className="mb-10">
              <Badge color="bg-brutal-yellow" className="rotate-2">WHERE TO USE</Badge>
              <h2 className="mt-4 text-4xl sm:text-5xl md:text-6xl font-black uppercase leading-none tracking-tight text-white">
                어디서 쓸 수 있나
              </h2>
            </div>
            <div className="grid gap-6 md:grid-cols-3">
              {places.map((p, i) => (
                <Box key={i} color={p.color} className={`press shadow-brutal p-6 ${p.textColor || 'text-black'}`}>
                  <div className="text-5xl mb-4">{p.emoji}</div>
                  <h3 className="font-mono font-black text-2xl uppercase">{p.title}</h3>
                  <p className="mt-3 font-mono font-bold leading-relaxed">{p.desc}</p>
                </Box>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // --- 지향점 (안전성 / 도움) ---
    function Values() {
      const items = [
        { k: '정직하게', color: 'bg-brutal-yellow', desc: '아는 것과 모르는 것을 솔직하게. 지어내지 않습니다.' },
        { k: '무해하게', color: 'bg-brutal-pink',   desc: '안전(safety)을 우선하며 해가 되지 않도록 행동합니다.' },
        { k: '도움이 되게', color: 'bg-brutal-green', desc: '진짜로 여러분에게 도움이 되는 방향을 지향합니다.' },
      ];
      return (
        <section id="values" className="border-b-4 border-black bg-white">
          <div className="mx-auto max-w-6xl px-4 py-16 sm:py-24">
            <SectionTitle kicker="OUR VALUES" title="클로드의 지향점" color="bg-brutal-blue" />
            <div className="grid gap-6 md:grid-cols-3">
              {items.map((it, i) => (
                <Box key={i} color="bg-brutal-cream" className={`shadow-brutal p-8 ${i === 1 ? 'md:-translate-y-4' : ''}`}>
                  <div className={`inline-block border-4 border-black ${it.color} px-4 py-2 shadow-brutal-sm -rotate-2`}>
                    <span className="font-black text-2xl uppercase">{it.k}</span>
                  </div>
                  <p className="mt-5 font-mono font-bold text-lg leading-relaxed">{it.desc}</p>
                </Box>
              ))}
            </div>
            <p className="mt-10 font-mono font-black text-xl sm:text-2xl">
              Anthropic 은 <span className="bg-black text-brutal-yellow px-2">안전하고 도움이 되는 AI</span> 를 만드는 것을 지향합니다.
            </p>
          </div>
        </section>
      );
    }

    // --- 마무리 CTA ---
    function CTA() {
      const [clicks, setClicks] = useState(0);
      const replies = [
        '무엇이든 물어보세요.',
        '네, 듣고 있어요.',
        '같이 만들어봐요.',
        '한 번 더 눌러보실래요?',
        '역시 좋은 질문이네요.',
      ];
      return (
        <section className="bg-brutal-red border-b-4 border-black">
          <div className="mx-auto max-w-4xl px-4 py-20 text-center">
            <h2 className="text-4xl sm:text-6xl font-black uppercase leading-none text-white">
              그럼, 시작해볼까요?
            </h2>
            <p className="mt-6 font-mono font-bold text-lg text-white">
              궁금한 걸 던져주세요. 함께 생각하고, 함께 만들어요.
            </p>

            <div className="mt-10 flex flex-wrap justify-center gap-4">
              <Button color="bg-brutal-yellow" size="lg" onClick={() => setClicks(c => c + 1)}>
                💬 클로드에게 말 걸기
              </Button>
              <Button color="bg-white" size="lg" onClick={() => { location.hash = '#top'; }}>
                ↑ 처음으로
              </Button>
            </div>

            {clicks > 0 && (
              <div className="mt-8 inline-block border-4 border-black bg-white shadow-brutal px-6 py-4 -rotate-1">
                <span className="font-mono font-black">
                  클로드 🤖 : {replies[Math.min(clicks - 1, replies.length - 1)]}
                </span>
              </div>
            )}
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="bg-black text-white">
          <div className="mx-auto max-w-6xl px-4 py-10 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <span className="grid place-items-center h-9 w-9 border-4 border-white bg-brutal-yellow text-black font-black">C</span>
              <span className="font-mono font-black uppercase">Claude · by Anthropic</span>
            </div>
            <p className="font-mono text-sm opacity-70 text-center sm:text-right">
              정직하고 · 무해하고 · 도움이 되는 AI 어시스턴트
