<body class="bg-paper text-ink font-sans">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // 1) React Hooks
    // ========================================
    const { useState, useEffect, useRef } = React;

    // ========================================
    // 2) 🎨 Design System — 순수 프레젠테이션 컴포넌트
    // ========================================

    // 스크롤 진입 시 페이드업. IntersectionObserver 기반, 1회 실행.
    function Reveal({ children, className = "", delay = 0, as: Tag = "div" }) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              setVisible(true);
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
        io.observe(el);
        return () => io.disconnect();
      }, []);

      return (
        <Tag
          ref={ref}
          className={`reveal ${visible ? "is-visible" : ""} ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </Tag>
      );
    }

    // 섹션 상단 라벨 — 대문자 + 넓은 트래킹 + 코랄 점 (에디토리얼 무드)

      return (
        <div className="flex items-center gap-3 text-[11px] sm:text-xs font-semibold tracking-[0.22em] uppercase text-muted">

          {children}
        </div>
      );
    }

    // 버튼 (앵커 기반). variant: primary | ghost
    function Button({ href, children, variant = "primary", external = false, className = "" }) {
      const base = "inline-flex items-center justify-center gap-2 rounded-full px-6 py-3 text-sm font-semibold transition-all duration-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-clay focus-visible:ring-offset-2 focus-visible:ring-offset-paper";
      const styles = {
        primary: "bg-ink text-paper hover:bg-clay hover:-translate-y-0.5 shadow-sm",
        ghost: "border border-line text-ink hover:border-ink hover:-translate-y-0.5",
      };
      const rel = external ? "noopener noreferrer" : undefined;
      const target = external ? "_blank" : undefined;
      return (
        <a href={href} target={target} rel={rel} className={`${base} ${styles[variant]} ${className}`}>
          {children}
        </a>
      );
    }

    // 기능/강점 카드

      return (

    function App() {
