<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김부장 · MR. KIM — 시리즈 포스터</title>

  <!-- ⚠️ 모든 CDN 버전 고정. @babel/standalone 은 반드시 7.x (8.x 는 인라인 text/babel 깨짐) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <!-- Google Fonts: Black Han Sans(타이틀), Noto Serif KR(태그라인/크레딧) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Serif+KR:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root { color-scheme: dark; }

    html, body {
      margin: 0;
      height: 100%;
      background: #030304;
      overflow: hidden;
    }

    /* 화면 전체 무대 (포스터를 중앙에 스케일) */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(120% 90% at 50% 40%, #141417 0%, #060607 55%, #020203 100%);
      padding: 8px;
    }

    /* ── B2 세로 포스터 카드 (500 : 707 ≒ 1 : 1.414) ── */
    .poster {
      position: relative;
      aspect-ratio: 500 / 707;
      height: min(94vh, 132.9vw);        /* 뷰포트 높이/폭 어느 쪽에도 안 잘리게 */
      background: #08080a;
      overflow: hidden;
      border-radius: 4px;
      box-shadow:
        0 40px 120px rgba(0,0,0,0.85),
        0 8px 30px rgba(0,0,0,0.7),
        0 0 0 1px rgba(255,255,255,0.04) inset;
      container-type: inline-size;       /* cqw 폰트 스케일용 */
      isolation: isolate;
    }

    /* ── 인물 레이어 공통 ── */
    .fig {
      position: absolute;
      background-repeat: no-repeat;
    }

    /* 좌측 전경 — 스틸컷 01 (선글라스 옆모습, 느와르 핵심 / 가장 큼) */
    .fig-left {
      left: -9%;
      top: -1%;
      width: 70%;
      height: 90%;
      background-size: cover;
      background-position: 41% 14%;
      z-index: 3;
      filter: grayscale(0.28) brightness(0.86) contrast(1.08) saturate(0.82);
      -webkit-mask-image:
        linear-gradient(to right,  #000 50%, transparent 95%),
        linear-gradient(to bottom, #000 64%, transparent 100%),
        linear-gradient(to left,   #000 88%, transparent 100%);
      mask-image:
        linear-gradient(to right,  #000 50%, transparent 95%),
        linear-gradient(to bottom, #000 64%, transparent 100%),
        linear-gradient(to left,   #000 88%, transparent 100%);
      -webkit-mask-composite: source-in;
      mask-composite: intersect;
    }

    /* 중앙 후경 — 스틸컷 02 (뿔테 안경, 고개 숙인 고뇌 / 어둠 속으로 물러남) */
    .fig-center {
      left: 31%;
      top: 5%;
      width: 46%;
      height: 78%;
      background-size: cover;
      background-position: 50% 16%;
      z-index: 1;
      filter: grayscale(0.40) brightness(0.58) contrast(1.06) saturate(0.70);
      -webkit-mask-image: radial-gradient(70% 66% at 52% 40%, #000 40%, transparent 84%);
      mask-image: radial-gradient(70% 66% at 52% 40%, #000 40%, transparent 84%);
    }

    /* 우측 전경 — 스틸컷 06 상단 프레임(권총 겨눔)만 노출 : wrapper+img 결정적 크롭 */
    .fig-right {
      right: -5%;
      top: 9%;
      width: 55%;
      aspect-ratio: 1.24 / 1;       /* 가로가 더 김 → 상단 프레임 밴드만 노출(하단 칼 컷 배제) */
      overflow: hidden;
      z-index: 2;
      -webkit-mask-image:
        linear-gradient(to right, transparent 0%, #000 32%, #000 62%, transparent 97%),
        linear-gradient(to bottom, #000 38%, transparent 76%),
        linear-gradient(to top, #000 90%, transparent 100%);
      mask-image:
        linear-gradient(to right, transparent 0%, #000 32%, #000 62%, transparent 97%),
        linear-gradient(to bottom, #000 38%, transparent 76%),
        linear-gradient(to top, #000 90%, transparent 100%);
      -webkit-mask-composite: source-in;
      mask-composite: intersect;
    }
    .fig-right img {
      position: absolute;
      top: -16%;                    /* 상단 프레임 인물 머리를 컨테이너 상단 근처로 */
      left: -22%;
      width: 176%;                  /* 줌인 : 하단(칼) 프레임은 뷰포트 밖으로 밀림 */
      display: block;
      /* 야외 흙바닥의 따뜻한 톤을 죽여 느와르로 통일 */
      filter: grayscale(0.6) brightness(0.72) contrast(1.15) saturate(0.6);
    }
    /* 우측 인물 오른쪽(밝은 바닥)을 검정으로 추가 융화 */
    .fig-right::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(105deg, rgba(5,5,7,0) 42%, rgba(5,5,7,0.45) 72%, rgba(5,5,7,0.9) 100%),
        linear-gradient(to bottom, rgba(5,5,7,0) 46%, rgba(5,5,7,0.9) 100%);
    }

    /* ── 톤 통일: 인물 위 다크 그라데이션 오버레이 ── */
    .grade {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        linear-gradient(to right, rgba(4,4,6,0.72) 0%, rgba(4,4,6,0) 22%, rgba(4,4,6,0) 78%, rgba(4,4,6,0.72) 100%),
        linear-gradient(to bottom, rgba(4,4,6,0.85) 0%, rgba(4,4,6,0) 20%),
        linear-gradient(to top, #050506 6%, rgba(5,5,6,0.98) 23%, rgba(5,5,6,0.55) 41%, rgba(5,5,6,0) 60%);
    }

    /* 모서리 비네트 */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background: radial-gradient(120% 100% at 50% 42%, rgba(0,0,0,0) 46%, rgba(0,0,0,0.55) 82%, rgba(0,0,0,0.9) 100%);
      mix-blend-mode: multiply;
    }

    /* 필름 그레인 */
    .grain {
      position: absolute;
      inset: -20%;
      z-index: 7;
      pointer-events: none;
      opacity: 0.08;
      mix-blend-mode: soft-light;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    /* ── 텍스트 스택 ── */
    .textblock {
      position: absolute;
      left: 0; right: 0; bottom: 4%;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 6%;
    }

    .tagline {
      font-family: "Noto Serif KR", serif;
      font-weight: 300;
      color: #c7c7cb;
      letter-spacing: 0.17em;
      line-height: 1.85;
      font-size: 2.8cqw;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      margin: 0 0 3.4cqw;
      opacity: 0.92;
    }
    .tagline .em { color: #ececed; }

    /* 대형 실버 그런지 타이틀 */
    .title {
      font-family: "Black Han Sans", sans-serif;
      font-size: 31cqw;
      line-height: 0.9;
      letter-spacing: 0.005em;
      margin: 0;
      position: relative;
      color: transparent;
      background-image: linear-gradient(
        177deg,
        #eceef0 0%,
        #c4c7cc 16%,
        #9598a0 34%,
        #dcdee2 49%,
        #7d818a 64%,
        #bcbfc5 82%,
        #6d7076 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      filter: url(#grunge) drop-shadow(0 3px 5px rgba(0,0,0,0.7));
    }
    /* 브러시드 메탈 — 긁힘/마모 얼룩 (텍스트에 clip) */
    .title::after {
      content: "김부장";
      position: absolute;
      inset: 0;
      color: transparent;
      background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='340' height='150'><filter id='m'><feTurbulence type='fractalNoise' baseFrequency='0.11 0.07' numOctaves='3' seed='11'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23m)'/></svg>"),
        repeating-linear-gradient(93deg, rgba(255,255,255,0) 0px, rgba(255,255,255,0.10) 1px, rgba(0,0,0,0.10) 2px, rgba(255,255,255,0) 5px);
      background-size: 100% 100%, auto;
      -webkit-background-clip: text;
      background-clip: text;
      mix-blend-mode: overlay;
      opacity: 0.42;
      pointer-events: none;
    }

    .subtitle {
      font-family: "Noto Serif KR", serif;
      font-weight: 500;
      color: #b9bcc1;
      letter-spacing: 0.62em;
      text-indent: 0.62em;             /* 자간 보정으로 중앙정렬 */
      font-size: 3.5cqw;
      margin: 2.2cqw 0 0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .credits {
      margin-top: 4.4cqw;
      font-family: "Noto Serif KR", serif;
      font-weight: 300;
      color: #9a9a9f;
      line-height: 1.8;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }
    .credits .cast {
      font-weight: 400;
      color: #cfd0d3;
      letter-spacing: 0.10em;
      font-size: 2.5cqw;
    }
    .credits .meta {
      letter-spacing: 0.15em;
      font-size: 2.0cqw;
      color: #8d8e93;
      margin-top: 0.6cqw;
    }
    .credits .year {
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      font-size: 2.0cqw;
      color: #8a8b90;
      margin-top: 1.4cqw;
    }
    .credits .fine {
      margin: 2.2cqw auto 0;
      max-width: 92%;
      font-weight: 300;
      font-size: 1.5cqw;
      letter-spacing: 0.05em;
      line-height: 1.75;
      color: #737479;
    }
    .credits .dot { color: #5c5d61; padding: 0 0.35em; }
    .credits .bar { color: #46474b; padding: 0 0.65em; }

    /* 성과 뱃지 — 상단 월계관 라벨 */
    .award {
      position: absolute;
      top: 3.4%;
      left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.6cqw;
      pointer-events: none;
    }
    .award::before, .award::after {
      content: "";
      width: 7cqw;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(203,185,141,0.75));
    }
    .award::after { transform: scaleX(-1); }
    .award span {
      font-family: "Noto Serif KR", serif;
      font-weight: 500;
      font-size: 2.0cqw;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      color: #d9c79d;
      white-space: nowrap;
      text-shadow: 0 1px 6px rgba(0,0,0,0.95);
    }

    /* 레드 카피 — 느와르 한 줄 */
    .redcopy {
      font-family: "Noto Serif KR", serif;
      font-weight: 600;
      font-size: 2.95cqw;
      letter-spacing: 0.1em;
      color: #d21f26;
      margin: 2.8cqw 0 0;
      text-shadow: 0 1px 8px rgba(0,0,0,0.9), 0 0 18px rgba(210,31,38,0.3);
    }

    /* 장르 태그 */
    .genre {
      font-family: "Noto Serif KR", serif;
      font-weight: 400;
      font-size: 1.95cqw;
      letter-spacing: 0.3em;
      text-indent: 0.3em;
      color: #9fa0a4;
      margin-top: 1.9cqw;
    }
  </style>
</head>
<body>
  <!-- 그런지 SVG 필터 (타이틀 거친 실버 엣지) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <filter id="grunge" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.014 0.16" numOctaves="2" seed="7" result="n" />
        <feDisplacementMap in="SourceGraphic" in2="n" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    // (상태/라우팅/API 불필요 — 정적 포스터)

    // 한글 파일명 → 안전한 상대경로 (encodeURI 로 로딩 보장)
    const cut = (n) => encodeURI(`./김부장-스틸컷-${n}.jpg`);

    // ========================================
    // 🧩 인물 레이어 (신세계 3인 구도 → 소지섭 3모습)
    // ========================================
    function Figures() {
      return (
        <React.Fragment>
          {/* 중앙 후경: 뿔테 안경, 고뇌하는 부장 (어둠 속) — 신세계 이정재 자리 */}
          <div
            className="fig fig-center"
            style={{ backgroundImage: `url("${cut("02")}")` }}
            role="img"
            aria-label="뿔테 안경을 쓴 김부장의 고뇌하는 정면"
          />

          {/* 우측 전경: 권총 겨눔 (스틸컷 06 상단 프레임만 노출) */}
          <div className="fig fig-right" role="img" aria-label="권총을 겨누는 김부장">
            <img src={cut("06")} alt="" />
          </div>

          {/* 좌측 전경: 선글라스 옆모습 — 느와르 핵심 (가장 큼) */}
          <div
            className="fig fig-left"
            style={{ backgroundImage: `url("${cut("01")}")` }}
            role="img"
            aria-label="선글라스를 낀 김부장의 밤거리 옆모습"
          />
        </React.Fragment>
      );
    }

    // ========================================
    // 🧩 텍스트 스택 (태그라인 · 대형 타이틀 · 크레딧)
    // ========================================
    function PosterText() {
      return (
        <div className="textblock">
          <p className="tagline">
            세상에서 가장 평범한 아빠가,<br />
            <span className="em">가장 위험한 남자가 된다</span>
          </p>

          <h1 className="title" aria-label="김부장">김부장</h1>
          <p className="subtitle">MR. KIM</p>

          <p className="redcopy">딸을 위해, 다시 괴물이 된다</p>
          <p className="genre">코미디 · 액션 · 느와르 · 첩보</p>

          <div className="credits">
            <div className="cast">
              소지섭<span className="dot">·</span>서지혜<span className="dot">·</span>서수민<span className="dot">·</span>최대훈<span className="dot">·</span>윤경호<span className="dot">·</span>주상욱<span className="dot">·</span>손나은
            </div>
            <div className="meta">
              SBS 금토드라마<span className="dot">·</span>매주 금·토 밤 9:50<span className="dot">·</span>NETFLIX 동시 스트리밍
            </div>
            <div className="year">2026.06.26 – 07.25 · 총 10부작</div>
            <div className="fine">
              원작 웹툰 「김부장」(정종택) · 박태준 유니버스<span className="bar">|</span>극본 남대중<span className="bar">|</span>연출 이승영 · 이소은<span className="bar">|</span>제작 스튜디오S · 판타지오
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🎬 포스터 카드
    // ========================================
    function Poster() {
      return (
        <div className="poster" aria-label="넷플릭스·SBS 드라마 김부장 시리즈 포스터">
          <Figures />
          <div className="grade" />
          <div className="vignette" />
          <div className="grain" />
          <div className="award"><span>넷플릭스 비영어 TV쇼 2주 연속 세계 1위</span></div>
          <PosterText />
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return (
        <div className="stage">
          <Poster />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
